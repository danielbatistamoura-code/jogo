<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Mario - 10 Fases com Koopalings</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a2f5a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
        }

        #loginScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(12px);
            animation: fadeIn 0.6s ease;
        }
        #loginScreen.hidden {
            display: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9) rotate(-2deg); }
            to { opacity: 1; transform: scale(1) rotate(0); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(-3deg); }
            50% { transform: translateY(-12px) rotate(3deg); }
        }

        @keyframes shine {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        .login-box {
            background: linear-gradient(145deg, #1d3b5c, #0f2840);
            padding: 45px 40px 35px;
            border-radius: 35px;
            box-shadow: 0 25px 0 #0a1a2b, 0 30px 60px rgba(0,0,0,0.8);
            text-align: center;
            width: 460px;
            max-width: 95vw;
            border: 3px solid #f5c542;
            position: relative;
            overflow: hidden;
            max-height: 95vh;
            overflow-y: auto;
        }

        .login-box::-webkit-scrollbar {
            width: 4px;
        }
        .login-box::-webkit-scrollbar-track {
            background: transparent;
        }
        .login-box::-webkit-scrollbar-thumb {
            background: #f5c542;
            border-radius: 10px;
        }

        .login-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, transparent 30%, rgba(245, 197, 66, 0.03) 50%, transparent 70%);
            background-size: 200% 200%;
            animation: shine 4s linear infinite;
            pointer-events: none;
        }

        .login-box .mario-icon {
            font-size: 4rem;
            display: block;
            margin-bottom: 0;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 8px 20px rgba(245, 197, 66, 0.3));
        }

        .login-box h1 {
            color: #f5c542;
            font-size: 2.6rem;
            text-shadow: 4px 4px 0 #b37b2a, 0 0 40px rgba(245, 197, 66, 0.15);
            margin-bottom: 2px;
            letter-spacing: 4px;
        }

        .login-box .subtitle {
            color: #b6d4ff;
            font-size: 0.95rem;
            margin-bottom: 25px;
            border-bottom: 2px solid #2d4f7a;
            padding-bottom: 15px;
            letter-spacing: 1px;
        }

        .login-box .subtitle span {
            color: #f5c542;
            font-weight: bold;
            background: rgba(245, 197, 66, 0.1);
            padding: 0 8px;
            border-radius: 10px;
        }

        .tab-container {
            display: flex;
            gap: 6px;
            margin-bottom: 20px;
            background: #0a1a2b;
            border-radius: 40px;
            padding: 4px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px 12px;
            border: none;
            border-radius: 30px;
            background: transparent;
            color: #6b8c9e;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            box-shadow: none;
        }

        .tab-btn:hover {
            color: #b6d4ff;
            transform: none;
            background: rgba(255,255,255,0.05);
        }

        .tab-btn.active {
            background: #f5c542;
            color: #1d2f4a;
            box-shadow: 0 4px 15px rgba(245, 197, 66, 0.2);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .login-box label {
            display: block;
            text-align: left;
            color: #b6d4ff;
            font-weight: bold;
            font-size: 0.8rem;
            margin-top: 12px;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        .login-box label .label-icon {
            margin-right: 6px;
        }

        .login-box input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 40px;
            border: 2px solid transparent;
            background: #0a1a2b;
            color: #fff;
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }

        .login-box input:focus {
            border-color: #f5c542;
            background: #152d4a;
            box-shadow: 0 0 30px rgba(245, 197, 66, 0.1), inset 0 2px 10px rgba(0,0,0,0.3);
        }

        .login-box input::placeholder {
            color: #4a6a8a;
        }

        .login-box .input-group {
            position: relative;
        }

        .login-box .input-group .input-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1rem;
            opacity: 0.4;
            pointer-events: none;
        }

        .login-box .login-btn {
            margin-top: 20px;
            width: 100%;
            padding: 14px;
            background: linear-gradient(145deg, #f5c542, #dba52a);
            border: none;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.1rem;
            color: #1d2f4a;
            box-shadow: 0 7px 0 #b37b2a, 0 4px 20px rgba(245, 197, 66, 0.25);
            cursor: pointer;
            transition: all 0.1s ease;
            font-family: inherit;
            letter-spacing: 1.5px;
        }

        .login-box .login-btn:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #b37b2a;
        }

        .login-box .login-btn:hover {
            background: linear-gradient(145deg, #fdd95c, #f5c542);
            transform: scale(1.01);
        }

        .login-box .login-btn:disabled {
            opacity: 0.6;
            transform: translateY(3px);
            box-shadow: 0 4px 0 #b37b2a;
            cursor: not-allowed;
        }

        .login-box .error-msg {
            color: #ff6b6b;
            font-size: 0.8rem;
            margin-top: 12px;
            min-height: 20px;
            font-weight: bold;
            background: rgba(255, 0, 0, 0.12);
            padding: 5px 14px;
            border-radius: 30px;
            display: inline-block;
        }

        .login-box .success-msg {
            color: #69db7c;
            font-size: 0.8rem;
            margin-top: 12px;
            min-height: 20px;
            font-weight: bold;
            background: rgba(105, 219, 124, 0.12);
            padding: 5px 14px;
            border-radius: 30px;
            display: inline-block;
        }

        .login-box .footer-info {
            margin-top: 16px;
            display: flex;
            justify-content: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .login-box .footer-info .badge {
            background: #0a1a2b;
            padding: 3px 12px;
            border-radius: 30px;
            color: #6b8c9e;
            font-size: 0.65rem;
            border: 1px solid #1d3b5c;
        }

        .login-box .footer-info .badge strong {
            color: #b6d4ff;
        }

        .login-box .footer-info .badge .key {
            color: #f5c542;
        }

        .login-box .switch-text {
            margin-top: 12px;
            color: #6b8c9e;
            font-size: 0.8rem;
        }

        .login-box .switch-text a {
            color: #f5c542;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.2s;
        }

        .login-box .switch-text a:hover {
            color: #fdd95c;
            text-decoration: underline;
        }

        #gameContainer.hidden {
            display: none;
        }

        .game-wrapper {
            background: #6b8cff;
            padding: 20px 20px 25px;
            border-radius: 24px;
            box-shadow: 0 12px 0 #3a5f8a, 0 8px 20px rgba(0, 0, 0, 0.6);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 16px;
            background: #5c94fc;
            box-shadow: inset 0 -6px 0 #3a6bb5, 0 0 0 4px #2d4f7a;
            image-rendering: pixelated;
            width: 800px;
            height: 400px;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 14px;
            padding: 10px 20px;
            background: #1d3b5c;
            border-radius: 60px;
            color: #f0e68c;
            text-shadow: 2px 2px 0 #0a1a2b;
            box-shadow: inset 0 -4px 0 #0f2840, 0 4px 0 #0f1f30;
            font-weight: bold;
            font-size: 1.1rem;
            flex-wrap: wrap;
            gap: 8px;
        }

        .info-panel span {
            background: #2d4f7a;
            padding: 5px 16px;
            border-radius: 40px;
            box-shadow: inset 0 -3px 0 #16304d;
        }

        .info-panel .user-tag {
            background: #0f2840;
            color: #b6d4ff;
            font-size: 0.8rem;
            padding: 5px 16px;
            border-radius: 40px;
            box-shadow: inset 0 -3px 0 #16304d;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-panel .user-tag .logout-btn {
            background: transparent;
            border: none;
            color: #ff6b6b;
            font-size: 0.9rem;
            cursor: pointer;
            padding: 0 4px;
            font-family: inherit;
            box-shadow: none;
            font-weight: bold;
            transition: all 0.2s;
        }

        .info-panel .user-tag .logout-btn:hover {
            color: #ff9999;
            transform: scale(1.2);
        }

        .info-panel .power-badge {
            background: #f5c542;
            color: #1d2f4a;
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            text-shadow: none;
            box-shadow: inset 0 -3px 0 #b37b2a;
            display: none;
        }

        .info-panel .power-badge.active {
            display: inline-block;
            animation: pulse 0.8s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        button {
            background: #f5c542;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
            color: #1d2f4a;
            box-shadow: 0 6px 0 #b37b2a, 0 4px 10px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            transition: all 0.07s;
            font-family: inherit;
        }

        button:active {
            transform: translateY(5px);
            box-shadow: 0 1px 0 #b37b2a;
        }

        button:hover {
            background: #fdd95c;
        }

        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .key-hint {
            color: #b6d4ff;
            font-size: 0.8rem;
            background: #0f2840;
            padding: 6px 12px;
            border-radius: 40px;
            letter-spacing: 1px;
        }

        .level-badge {
            background: #e53935;
            padding: 5px 18px;
            border-radius: 40px;
            color: #fff;
            text-shadow: 1px 1px 0 #7a1a1a;
        }

        .level-badge.hard {
            background: #8e24aa;
            box-shadow: 0 0 20px rgba(142, 36, 170, 0.5);
        }

        .level-badge.boss {
            background: #d32f2f;
            box-shadow: 0 0 30px rgba(211, 47, 47, 0.7);
            animation: bossGlow 1s ease-in-out infinite alternate;
        }

        @keyframes bossGlow {
            from { box-shadow: 0 0 20px rgba(211, 47, 47, 0.5); }
            to { box-shadow: 0 0 40px rgba(211, 47, 47, 0.9); }
        }

        .char-select {
            display: flex;
            gap: 6px;
            align-items: center;
            background: #0f2840;
            padding: 4px 12px 4px 16px;
            border-radius: 40px;
        }

        .char-btn {
            background: transparent;
            border: 2px solid transparent;
            border-radius: 30px;
            padding: 2px 10px;
            font-size: 0.9rem;
            box-shadow: none;
            color: #b6d4ff;
            transition: all 0.2s;
        }

        .char-btn:hover {
            background: #2d4f7a;
            transform: scale(1.05);
        }

        .char-btn.active {
            border-color: #f5c542;
            background: #2d4f7a;
            color: #fff;
        }

        .audio-controls {
            display: flex;
            gap: 6px;
            align-items: center;
            background: #0f2840;
            padding: 4px 12px;
            border-radius: 40px;
        }

        .audio-btn {
            background: transparent;
            border: none;
            color: #b6d4ff;
            font-size: 1.2rem;
            padding: 4px 8px;
            box-shadow: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .audio-btn:hover {
            transform: scale(1.2);
            color: #fff;
        }

        .audio-btn:active {
            transform: scale(0.9);
        }

        .volume-slider {
            width: 60px;
            height: 4px;
            accent-color: #f5c542;
            cursor: pointer;
        }

        .boss-name {
            color: #ff6b6b;
            font-weight: bold;
            font-size: 0.9rem;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
        }

        @media (max-width: 860px) {
            canvas {
                width: 100%;
                height: auto;
                aspect-ratio: 800/400;
            }
            .game-wrapper {
                padding: 12px;
                width: 96vw;
            }
            .info-panel {
                font-size: 0.85rem;
                justify-content: center;
            }
            .volume-slider {
                width: 40px;
            }
            .login-box {
                padding: 25px 18px;
                max-height: 98vh;
            }
            .login-box h1 {
                font-size: 2rem;
            }
            .login-box .mario-icon {
                font-size: 3rem;
            }
            .tab-btn {
                font-size: 0.75rem;
                padding: 8px 8px;
            }
        }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-box">
            <span class="mario-icon">⭐</span>
            <h1>SUPER MARIO</h1>
            <div class="subtitle">
                <span>10 fases</span> · <span>3 personagens</span> · <span>power-ups</span>
            </div>

            <div class="tab-container">
                <button class="tab-btn active" data-tab="login">🔐 Login</button>
                <button class="tab-btn" data-tab="register">📝 Cadastrar</button>
            </div>

            <div class="tab-content active" id="tabLogin">
                <form id="loginForm" autocomplete="off">
                    <label for="loginUsername">
                        <span class="label-icon">👤</span> Nome de usuário
                    </label>
                    <div class="input-group">
                        <input type="text" id="loginUsername" placeholder="Digite seu nome..." required minlength="2" maxlength="20">
                        <span class="input-icon">✏️</span>
                    </div>

                    <label for="loginPassword">
                        <span class="label-icon">🔒</span> Senha
                    </label>
                    <div class="input-group">
                        <input type="password" id="loginPassword" placeholder="Digite sua senha" required minlength="3">
                        <span class="input-icon">🔑</span>
                    </div>

                    <button type="submit" class="login-btn" id="loginBtn">▶ Entrar no Jogo</button>
                    <div class="error-msg" id="loginError"></div>
                </form>
                <div class="switch-text">
                    Não tem uma conta? <a id="switchToRegister">Cadastre-se aqui</a>
                </div>
            </div>

            <div class="tab-content" id="tabRegister">
                <form id="registerForm" autocomplete="off">
                    <label for="registerUsername">
                        <span class="label-icon">👤</span> Nome de usuário
                    </label>
                    <div class="input-group">
                        <input type="text" id="registerUsername" placeholder="Escolha um nome..." required minlength="2" maxlength="20">
                        <span class="input-icon">✏️</span>
                    </div>

                    <label for="registerPassword">
                        <span class="label-icon">🔒</span> Senha
                    </label>
                    <div class="input-group">
                        <input type="password" id="registerPassword" placeholder="Crie uma senha (mínimo 3 caracteres)" required minlength="3">
                        <span class="input-icon">🔑</span>
                    </div>

                    <label for="registerConfirmPassword">
                        <span class="label-icon">✅</span> Confirmar senha
                    </label>
                    <div class="input-group">
                        <input type="password" id="registerConfirmPassword" placeholder="Digite a senha novamente" required minlength="3">
                        <span class="input-icon">🔐</span>
                    </div>

                    <button type="submit" class="login-btn" id="registerBtn">📝 Criar Conta</button>
                    <div id="registerMessage"></div>
                </form>
                <div class="switch-text">
                    Já tem uma conta? <a id="switchToLogin">Faça login aqui</a>
                </div>
            </div>

            <div class="footer-info">
                <span class="badge">👤 <strong>admin</strong> <span class="key">/ 1234</span></span>
                <span class="badge">👤 <strong>mario</strong> <span class="key">/ mario</span></span>
                <span class="badge">👤 <strong>teste</strong> <span class="key">/ 123</span></span>
            </div>
        </div>
    </div>

    <div id="gameContainer" class="hidden">
        <div class="game-wrapper">
            <canvas id="gameCanvas" width="800" height="400"></canvas>
            <div class="info-panel">
                <div>
                    <span>🪙 <span id="coinDisplay">0</span></span>
                    <span style="margin-left: 10px;">🏆 <span id="scoreDisplay">0</span></span>
                    <span style="margin-left: 10px;" class="level-badge" id="levelBadge">Fase <span id="levelDisplay">1</span>/10</span>
                    <span class="power-badge" id="powerBadge">⭐ POWER-UP</span>
                    <span class="user-tag" id="userTag">
                        👤 <span id="usernameDisplay">Jogador</span>
                        <button class="logout-btn" id="logoutBtn" title="Sair do jogo">✕</button>
                    </span>
                </div>
                <div class="controls">
                    <div class="audio-controls">
                        <button class="audio-btn" id="playBtn" title="Play/Pause">▶️</button>
                        <button class="audio-btn" id="stopBtn" title="Stop">⏹️</button>
                        <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="70">
                    </div>
                    <div class="char-select">
                        <span style="color:#b6d4ff;font-size:0.8rem;">👤</span>
                        <button class="char-btn active" data-char="mario">Mario</button>
                        <button class="char-btn" data-char="luigi">Luigi</button>
                        <button class="char-btn" data-char="toad">Toad</button>
                    </div>
                    <span class="key-hint">← ↑ →</span>
                    <button id="restartBtn">↺ Reiniciar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // SISTEMA DE LOGIN E CADASTRO COM localStorage
        // ============================================================
        const loginScreen = document.getElementById('loginScreen');
        const gameContainer = document.getElementById('gameContainer');
        const usernameDisplay = document.getElementById('usernameDisplay');
        const logoutBtn = document.getElementById('logoutBtn');

        const tabBtns = document.querySelectorAll('.tab-btn');
        const tabContents = {
            login: document.getElementById('tabLogin'),
            register: document.getElementById('tabRegister')
        };

        const loginForm = document.getElementById('loginForm');
        const loginUsername = document.getElementById('loginUsername');
        const loginPassword = document.getElementById('loginPassword');
        const loginError = document.getElementById('loginError');
        const loginBtn = document.getElementById('loginBtn');

        const registerForm = document.getElementById('registerForm');
        const registerUsername = document.getElementById('registerUsername');
        const registerPassword = document.getElementById('registerPassword');
        const registerConfirmPassword = document.getElementById('registerConfirmPassword');
        const registerMessage = document.getElementById('registerMessage');
        const registerBtn = document.getElementById('registerBtn');

        const switchToRegister = document.getElementById('switchToRegister');
        const switchToLogin = document.getElementById('switchToLogin');

        let currentUser = null;

        function getUsers() {
            try {
                return JSON.parse(localStorage.getItem('marioUsers')) || {};
            } catch {
                return {};
            }
        }

        function saveUsers(users) {
            localStorage.setItem('marioUsers', JSON.stringify(users));
        }

        function userExists(username) {
            const users = getUsers();
            return users[username.toLowerCase()] !== undefined;
        }

        function validateUser(username, password) {
            const users = getUsers();
            const key = username.toLowerCase();
            return users[key] && users[key] === password;
        }

        function registerUser(username, password) {
            const users = getUsers();
            const key = username.toLowerCase();
            if (users[key]) return false;
            users[key] = password;
            saveUsers(users);
            return true;
        }

        tabBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                tabBtns.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                const tab = this.dataset.tab;
                Object.keys(tabContents).forEach(key => {
                    tabContents[key].classList.toggle('active', key === tab);
                });
                loginError.textContent = '';
                registerMessage.innerHTML = '';
            });
        });

        switchToRegister.addEventListener('click', function(e) {
            e.preventDefault();
            tabBtns.forEach(b => b.classList.remove('active'));
            document.querySelector('.tab-btn[data-tab="register"]').classList.add('active');
            tabContents.login.classList.remove('active');
            tabContents.register.classList.add('active');
            loginError.textContent = '';
            registerMessage.innerHTML = '';
            setTimeout(() => registerUsername.focus(), 100);
        });

        switchToLogin.addEventListener('click', function(e) {
            e.preventDefault();
            tabBtns.forEach(b => b.classList.remove('active'));
            document.querySelector('.tab-btn[data-tab="login"]').classList.add('active');
            tabContents.register.classList.remove('active');
            tabContents.login.classList.add('active');
            loginError.textContent = '';
            registerMessage.innerHTML = '';
            setTimeout(() => loginUsername.focus(), 100);
        });

        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const username = loginUsername.value.trim();
            const password = loginPassword.value.trim();

            loginError.textContent = '';
            loginBtn.disabled = true;
            loginBtn.textContent = '⏳ Entrando...';

            setTimeout(() => {
                if (!username || username.length < 2) {
                    loginError.textContent = '⚠️ Nome deve ter pelo menos 2 caracteres.';
                    loginBtn.disabled = false;
                    loginBtn.textContent = '▶ Entrar no Jogo';
                    return;
                }
                if (!password || password.length < 3) {

            return r1.x < r2.x + r2.w &&

                r1.y + r1.h > r2.y;
        }

        function resetGame() {
            gameOver = false;
            win = false;
            score = 0;
            coins = 0;
            currentLevel = 1;
            player.hasMushroom = false;
            player.hasStar = false;
            player.bigMode = false;
            player.starTimer = 0;
            applyCharStats();
            loadLevel(currentLevel);
            updateDisplay();
            updatePowerBadge();
        }

        function nextLevel() {
            if (currentLevel < MAX_LEVEL) {
                currentLevel++;
                loadLevel(currentLevel);
                win = false;
                gameOver = false;
                bossDefeated = false;
            } else {
                win = true;
            }
        }

        // Seleção de personagem
        document.querySelectorAll('.char-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.char-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                selectedChar = this.dataset.char;
                player.hasMushroom = false;
                player.hasStar = false;
                player.bigMode = false;
                player.starTimer = 0;
                applyCharStats();
                updatePowerBadge();
                loadLevel(currentLevel);
            });
        });

        // Reiniciar
        document.getElementById('restartBtn').addEventListener('click', resetGame);

        // Teclas
        window.addEventListener('keydown', function(e) {
            const key = e.key;
            if (key === 'ArrowLeft' || key === 'Left' || key === 'a' || key === 'A') {
                keys.left = true;
                e.preventDefault();
            } else if (key === 'ArrowRight' || key === 'Right' || key === 'd' || key === 'D') {
                keys.right = true;
                e.preventDefault();
            } else if (key === 'ArrowUp' || key === 'Up' || key === 'w' || key === 'W' || key === ' ') {
                keys.up = true;
                e.preventDefault();
                tryJump();
            }
        });

        window.addEventListener('keyup', function(e) {
            const key = e.key;
            if (key === 'ArrowLeft' || key === 'Left' || key === 'a' || key === 'A') {
                keys.left = false;
                e.preventDefault();
            } else if (key === 'ArrowRight' || key === 'Right' || key === 'd' || key === 'D') {
                keys.right = false;
                e.preventDefault();
            } else if (key === 'ArrowUp' || key === 'Up' || key === 'w' || key === 'W' || key === ' ') {
                keys.up = false;
                e.preventDefault();
            }
        });

        window.addEventListener('contextmenu', e => e.preventDefault());

        function update() {
            if (gameOver || win) return;

            if (player.hasStar) {
                player.starTimer--;
                if (player.starTimer <= 0) {
                    player.hasStar = false;
                    player.starTimer = 0;
                    updatePowerBadge();
                }
            }

            if (player.invincible > 0) player.invincible--;

            const speed = player.hasStar ? charStats.speed * 1.5 : charStats.speed;
            if (keys.left) {
                player.x -= speed;
                player.facing = -1;
            }
            if (keys.right) {
                player.x += speed;
                player.facing = 1;
            }
            if (player.x < 0) player.x = 0;
            if (player.x + player.w > 800) player.x = 800 - player.w;

            player.vy += GRAVITY;
            player.y += player.vy;

            player.onGround = false;
            for (let p of platforms) {
                if (player.vy >= 0 && rectCollide(player, p)) {
                    player.y = p.y - player.h;
                    player.vy = 0;
                    player.onGround = true;
                }
                if (p.type === 'question' && p.hasCoin && rectCollide(player, p)) {
                    p.hasCoin = false;
                    coins++;
                    score += 50;
                    updateDisplay();
                }
            }

            for (let coin of coinObjects) {
                if (!coin.collected && rectCollide(player, coin)) {
                    coin.collected = true;
                    coins++;
                    score += 30;
                    updateDisplay();
                }
            }

            for (let pu of powerups) {
                if (!pu.active) continue;
                if (rectCollide(player, pu)) {
                    pu.active = false;
                    if (pu.type === 'mushroom') {
                        player.hasMushroom = true;
                        player.bigMode = true;
                        applyCharStats();
                        score += 100;
                        updateDisplay();
                        updatePowerBadge();
                    } else if (pu.type === 'star') {
                        player.hasStar = true;
                        player.starTimer = 300;
                        player.invincible = 300;
                        score += 150;
                        updateDisplay();
                        updatePowerBadge();
                    }
                }
            }

            // Inimigos
            for (let enemy of enemies) {
                if (!enemy.active) continue;
                enemy.x += enemy.vx;
                if (enemy.x < 20 || enemy.x > 780) enemy.vx *= -1;

                if (rectCollide(player, enemy)) {
                    if (player.hasStar || player.invincible > 0) {
                        enemy.active = false;
                        score += 50;
                        updateDisplay();
                    } else if (player.vy > 0 && player.y + player.h - enemy.y < 20) {
                        enemy.active = false;
                        player.vy = -8;
                        score += 50;
                        updateDisplay();
                    } else {
                        gameOver = true;
                    }
                }
            }

            // Boss
            if (boss && boss.active) {
                boss.x += boss.vx;
                if (boss.x < 30 || boss.x > 750) boss.vx *= -1;

                if (boss.hitCooldown > 0) boss.hitCooldown--;

                // Ataques do boss (apenas efeito visual)
                if (boss.attackCooldown > 0) boss.attackCooldown--;
                
                // Boss mais rápido nas fases difíceis
                if (currentLevel >= 8) {
                    boss.vx = Math.sign(boss.vx) * (2.5 + (currentLevel - 7) * 0.3);
                }

                if (rectCollide(player, boss)) {
                    if (player.hasStar || player.invincible > 0) {
                        if (boss.hitCooldown <= 0) {
                            boss.hp--;
                            boss.hitCooldown = 30;
                            score += 150;
                            updateDisplay();
                            if (boss.hp <= 0) {
                                boss.active = false;
                                bossDefeated = true;
                                score += 500 * (currentLevel - 6);
                                updateDisplay();
                            }
                        }
                    } else if (player.vy > 0 && player.y + player.h - boss.y < 25) {
                        if (boss.hitCooldown <= 0) {
                            boss.hp--;
                            boss.hitCooldown = 30;
                            player.vy = -10;
                            score += 150;
                            updateDisplay();
                            if (boss.hp <= 0) {
                                boss.active = false;
                                bossDefeated = true;
                                score += 500 * (currentLevel - 6);
                                updateDisplay();
                            }
                        }
                    } else {
                        gameOver = true;
                    }
                }
            }

            // Verificar se chegou na bandeira
            if (rectCollide(player, flag)) {
                if (bossActive && !bossDefeated) {
                    // Precisa derrotar o boss primeiro
                } else {
                    win = true;
                    if (currentLevel === MAX_LEVEL) {
                        // Vitória final
                    }
                }
            }

            // Cair no vazio
            if (player.y > 450) {
                gameOver = true;
            }
        }

        function drawBoss() {
            if (!boss || !boss.active) return;
            
            const b = boss;
            
            // Sombra do boss
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.beginPath();
            ctx.ellipse(b.x + b.w/2, GROUND_Y + 5, b.w/2, 10, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Corpo do boss
            let grad = ctx.createLinearGradient(b.x, b.y, b.x + b.w, b.y + b.h);
            if (currentLevel === 10) {
                grad.addColorStop(0, '#D32F2F');
                grad.addColorStop(0.5, '#B71C1C');
                grad.addColorStop(1, '#880E4F');
            } else if (currentLevel === 9) {
                grad.addColorStop(0, '#FF5722');
                grad.addColorStop(1, '#BF360C');
            } else if (currentLevel === 8) {
                grad.addColorStop(0, '#9C27B0');
                grad.addColorStop(1, '#4A148C');
            } else {
                grad.addColorStop(0, '#4CAF50');
                grad.addColorStop(1, '#1B5E20');
            }
            
            ctx.fillStyle = grad;
            ctx.shadowColor = boss.color || '#ff0000';
            ctx.shadowBlur = currentLevel === 10 ? 40 : 20;
            
            // Corpo
            ctx.beginPath();
            ctx.roundRect(b.x, b.y, b.w, b.h, 8);
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // Cabeça
            ctx.fillStyle = '#FFB74D';
            ctx.beginPath();
            ctx.arc(b.x + b.w/2, b.y + 15, 16, 0, Math.PI * 2);
            ctx.fill();
            
            // Olhos
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(b.x + 14, b.y + 12, 7, 0, Math.PI * 2);
            ctx.arc(b.x + b.w - 14, b.y + 12, 7, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#1a1a2e';
            ctx.beginPath();
            ctx.arc(b.x + 16, b.y + 14, 4, 0, Math.PI * 2);
            ctx.arc(b.x + b.w - 12, b.y + 14, 4, 0, Math.PI * 2);
            ctx.fill();
            
            // Sobrancelhas (expressão de raiva)
            ctx.strokeStyle = '#1a1a2e';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(b.x + 8, b.y + 6);
            ctx.lineTo(b.x + 18, b.y + 8);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(b.x + b.w - 8, b.y + 6);
            ctx.lineTo(b.x + b.w - 18, b.y + 8);
            ctx.stroke();
            
            // Boca
            if (currentLevel === 10) {
                // Bowser com fogo
                ctx.fillStyle = '#FF6F00';
                ctx.beginPath();
                ctx.arc(b.x + b.w/2, b.y + 24, 12, 0, Math.PI);
                ctx.fill();
                ctx.fillStyle = '#FFAB00';
                ctx.beginPath();
                ctx.arc(b.x + b.w/2, b.y + 22, 8, 0, Math.PI);
                ctx.fill();
                
                // Fogo saindo da boca
                if (Math.floor(Date.now() / 500) % 2 === 0) {
                    ctx.fillStyle = 'rgba(255, 107, 0, 0.6)';
                    ctx.beginPath();
                    ctx.moveTo(b.x + b.w/2 - 10, b.y + 26);
                    ctx.lineTo(b.x + b.w/2, b.y + 40);
                    ctx.lineTo(b.x + b.w/2 + 10, b.y + 26);
                    ctx.fill();
                    ctx.fillStyle = 'rgba(255, 200, 0, 0.4)';
                    ctx.beginPath();
                    ctx.moveTo(b.x + b.w/2 - 6, b.y + 28);
                    ctx.lineTo(b.x + b.w/2, b.y + 50);
                    ctx.lineTo(b.x + b.w/2 + 6, b.y + 28);
                    ctx.fill();
                }
            } else {
                // Sorriso malvado
                ctx.fillStyle = '#1a1a2e';
                ctx.beginPath();
                ctx.arc(b.x + b.w/2, b.y + 24, 8, 0, Math.PI);
                ctx.fill();
            }
            
            // Chifres (Bowser e Bowser Jr)
            if (currentLevel >= 9) {
                ctx.fillStyle = '#5D4037';
                ctx.beginPath();
                ctx.moveTo(b.x + 6, b.y + 2);
                ctx.lineTo(b.x, b.y - 10);
                ctx.lineTo(b.x + 12, b.y + 4);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(b.x + b.w - 6, b.y + 2);
                ctx.lineTo(b.x + b.w, b.y - 10);
                ctx.lineTo(b.x + b.w - 12, b.y + 4);
                ctx.fill();
            }
            
            // Coroa (Bowser)
            if (currentLevel === 10) {
                ctx.fillStyle = '#FFD700';
                ctx.shadowColor = '#FFD700';
                ctx.shadowBlur = 15;
                ctx.font = '20px "Courier New"';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('👑', b.x + b.w/2, b.y - 12);
                ctx.shadowBlur = 0;
            }
            
            // Nome do boss
            ctx.fillStyle = '#fff';
            ctx.shadowColor = 'rgba(0,0,0,0.8)';
            ctx.shadowBlur = 10;
            ctx.font = 'bold 14px "Courier New"';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            let bossEmoji = currentLevel === 10 ? '👑' : '👹';
            ctx.fillText(`${bossEmoji} ${boss.name}`, b.x + b.w/2, b.y - 18);
            ctx.shadowBlur = 0;
            
            // Barra de vida do boss
            const barWidth = b.w + 20;
            const barX = b.x - 10;
            const barY = b.y - 36;
            
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.beginPath();
            ctx.roundRect(barX, barY, barWidth, 10, 5);
            ctx.fill();
            
            const hpPercent = b.hp / b.maxHp;
            const hpColor = hpPercent > 0.5 ? '#4CAF50' : (hpPercent > 0.25 ? '#FF9800' : '#F44336');
            ctx.fillStyle = hpColor;
            ctx.shadowColor = hpColor;
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.roundRect(barX + 2, barY + 2, (barWidth - 4) * hpPercent, 6, 3);
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // Texto da vida
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 10px "Courier New"';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(`${b.hp}/${b.maxHp}`, barX + barWidth/2, barY + 5);
        }

        function draw() {
            ctx.clearRect(0, 0, 800, 400);
            
            // Fundo - com cores diferentes para fases difíceis
            if (currentLevel >= 7 && currentLevel <= 9) {
                const colors = ['#1a0a2e', '#2d1b4e', '#3d1f5e'];
                let grad = ctx.createLinearGradient(0, 0, 0, 400);
                grad.addColorStop(0, colors[currentLevel - 7]);
                grad.addColorStop(1, '#0a0a1a');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, 800, 400);
            } else if (currentLevel === 10) {
                let grad = ctx.createLinearGradient(0, 0, 0, 400);
                grad.addColorStop(0, '#1a0000');
                grad.addColorStop(0.5, '#2d0a0a');
                grad.addColorStop(1, '#0a0000');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, 800, 400);
                // Efeito de fogo no fundo
                for (let i = 0; i < 20; i++) {
                    let x = Math.random() * 800;
                    let y = Math.random() * 300 + 100;
                    let alpha = Math.random() * 0.1;
                    ctx.fillStyle = `rgba(255, 100, 0, ${alpha})`;
                    ctx.beginPath();
                    ctx.arc(x, y, 20 + Math.random() * 30, 0, Math.PI * 2);
                    ctx.fill();
                }
            } else {
                ctx.fillStyle = '#5c94fc';
                ctx.fillRect(0, 0, 800, 400);
                // Nuvens
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.beginPath();
                ctx.arc(100, 60, 40, 0, Math.PI * 2);
                ctx.arc(140, 40, 35, 0, Math.PI * 2);
                ctx.arc(170, 60, 30, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(600, 50, 45, 0, Math.PI * 2);
                ctx.arc(650, 30, 35, 0, Math.PI * 2);
                ctx.arc(680, 50, 30, 0, Math.PI * 2);
                ctx.fill();
            }

            // Plataformas
            for (let p of platforms) {
                if (p.type === 'ground') {
                    if (currentLevel >= 7) {
                        ctx.fillStyle = '#2d1b3d';
                        ctx.fillRect(p.x, p.y, p.w, p.h);
                        ctx.fillStyle = '#3d2b4d';
                        ctx.fillRect(p.x, p.y + 4, p.w, 4);
                    } else {
                        ctx.fillStyle = '#4a7a3a';
                        ctx.fillRect(p.x, p.y, p.w, p.h);
                        ctx.fillStyle = '#3a6a2a';
                        ctx.fillRect(p.x, p.y + 4, p.w, 4);
                    }
                } else if (p.type === 'brick') {
                    if (currentLevel >= 7) {
                        ctx.fillStyle = '#5d2a3a';
                        ctx.fillRect(p.x, p.y, p.w, p.h);
                        ctx.strokeStyle = '#3d1a2a';
                        ctx.lineWidth = 1;
                        ctx.strokeRect(p.x, p.y, p.w, p.h);
                        ctx.fillStyle = '#4d2a3a';
                        ctx.fillRect(p.x + 4, p.y + 4, p.w/2 - 4, 4);
                        ctx.fillRect(p.x + p.w/2, p.y + 4, p.w/2 - 4, 4);
                    } else {
                        ctx.fillStyle = '#c67b4a';
                        ctx.fillRect(p.x, p.y, p.w, p.h);
                        ctx.strokeStyle = '#8d5a3a';
                        ctx.lineWidth = 1;
                        ctx.strokeRect(p.x, p.y, p.w, p.h);
                        ctx.fillStyle = '#b06a3a';
                        ctx.fillRect(p.x + 4, p.y + 4, p.w/2 - 4, 4);
                        ctx.fillRect(p.x + p.w/2, p.y + 4, p.w/2 - 4, 4);
                    }
                } else if (p.type === 'question') {
                    ctx.fillStyle = '#f5c542';
                    ctx.fillRect(p.x, p.y, p.w, p.h);
                    ctx.fillStyle = '#dba52a';
                    ctx.fillRect(p.x + 4, p.y + 4, p.w - 8, p.h - 8);
                    ctx.fillStyle = '#f5c542';
                    ctx.font = '16px "Courier New"';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('?', p.x + p.w/2, p.y + p.h/2 + 1);
                    if (p.hasCoin) {
                        ctx.fillStyle = 'rgba(255,215,0,0.3)';
                        ctx.fillRect(p.x, p.y, p.w, p.h);
                    }
                }
            }

            // Moedas
            for (let coin of coinObjects) {
                if (!coin.collected) {
                    ctx.fillStyle = '#ffd700';
                    ctx.shadowColor = '#ffd700';
                    ctx.shadowBlur = 10;
                    ctx.beginPath();
                    ctx.arc(coin.x + coin.w/2, coin.y + coin.h/2, coin.w/2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }

            // Power-ups
            for (let pu of powerups) {
                if (!pu.active) continue;
                if (pu.type === 'mushroom') {
                    ctx.fillStyle = '#ff6b35';
                    ctx.shadowColor = '#ff6b35';
                    ctx.shadowBlur = 15;
                    ctx.beginPath();
                    ctx.arc(pu.x + pu.w/2, pu.y + pu.h/2, pu.w/2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(pu.x + pu.w/2 - 4, pu.y + pu.h/2 - 4, 4, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(pu.x + pu.w/2 + 4, pu.y + pu.h/2 - 4, 4, 0, Math.PI * 2);
                    ctx.fill();
                } else if (pu.type === 'star') {
                    ctx.fillStyle = '#ffd700';
                    ctx.shadowColor = '#ffd700';
                    ctx.shadowBlur = 30;
                    ctx.font = '24px "Courier New"';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('⭐', pu.x + pu.w/2, pu.y + pu.h/2);
                    ctx.shadowBlur = 0;
                }
            }

            // Inimigos
            for (let enemy of enemies) {
                if (!enemy.active) continue;
                if (currentLevel >= 7) {
                    ctx.fillStyle = '#6d2a2a';
                    ctx.fillRect(enemy.x, enemy.y, enemy.w, enemy.h);
                    ctx.fillStyle = '#4d1a1a';
                    ctx.fillRect(enemy.x + 4, enemy.y - 4, enemy.w - 8, 6);
                    ctx.fillStyle = '#ff6b6b';
                    ctx.fillRect(enemy.x + 6, enemy.y + 6, 6, 6);
                    ctx.fillRect(enemy.x + 16, enemy.y + 6, 6, 6);
                    ctx.fillStyle = '#000';
                    ctx.fillRect(enemy.x + 8, enemy.y + 8, 3, 3);
                    ctx.fillRect(enemy.x + 18, enemy.y + 8, 3, 3);
                } else {
                    ctx.fillStyle = '#8d6e63';
                    ctx.fillRect(enemy.x, enemy.y, enemy.w, enemy.h);
                    ctx.fillStyle = '#5d4037';
                    ctx.fillRect(enemy.x + 4, enemy.y - 4, enemy.w - 8, 6);
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(enemy.x + 6, enemy.y + 6, 6, 6);
                    ctx.fillRect(enemy.x + 16, enemy.y + 6, 6, 6);
                    ctx.fillStyle = '#000';
                    ctx.fillRect(enemy.x + 8, enemy.y + 8, 3, 3);
                    ctx.fillRect(enemy.x + 18, enemy.y + 8, 3, 3);
                }
            }

            // Boss
            drawBoss();

            // Bandeira
            ctx.fillStyle = '#4a7a3a';
            ctx.fillRect(flag.x + 8, flag.y, 4, flag.h);
            ctx.fillStyle = currentLevel === 10 ? '#FFD700' : '#f44336';
            ctx.shadowColor = currentLevel === 10 ? '#FFD700' : '#f44336';
            ctx.shadowBlur = currentLevel === 10 ? 20 : 5;
            ctx.beginPath();
            ctx.moveTo(flag.x + 12, flag.y);
            ctx.lineTo(flag.x + 12, flag.y + 30);
            ctx.lineTo(flag.x + 40, flag.y + 15);
            ctx.closePath();
            ctx.fill();
            ctx.shadowBlur = 0;

            // Player
            if (player.invincible > 0 && player.invincible % 6 < 3) {
                // Piscar
            } else {
                const color = player.hasStar ? '#ffd700' : (player.hasMushroom ? '#ff6b35' : charStats.color1);
                ctx.shadowColor = player.hasStar ? '#ffd700' : 'transparent';
                ctx.shadowBlur = player.hasStar ? 30 : 0;
                
                // Corpo
                ctx.fillStyle = color;
                ctx.fillRect(player.x, player.y + 10, player.w, player.h - 10);
                
                // Cabeça
                ctx.fillStyle = player.hasStar ? '#fff' : charStats.skin;
                ctx.fillRect(player.x + 4, player.y, player.w - 8, 14);
                
                // Chapéu
                ctx.fillStyle = color;
                ctx.fillRect(player.x + 2, player.y - 4, player.w - 4, 8);
                
                // Olhos
                ctx.fillStyle = '#fff';
                ctx.fillRect(player.x + (player.facing > 0 ? 18 : 6), player.y + 4, 6, 6);
                ctx.fillStyle = '#000';
                ctx.fillRect(player.x + (player.facing > 0 ? 20 : 8), player.y + 6, 3, 3);
                
                // Pernas
                ctx.fillStyle = '#4e342e';
                ctx.fillRect(player.x + 2, player.y + player.h - 4, 10, 4);
                ctx.fillRect(player.x + player.w - 12, player.y + player.h - 4, 10, 4);
                
                ctx.shadowBlur = 0;
                
                // Power-up ícones
                if (player.hasStar) {
                    ctx.fillStyle = '#ffd700';
                    ctx.shadowColor = '#ffd700';
                    ctx.shadowBlur = 20;
                    ctx.font = '16px "Courier New"';
                    ctx.textAlign = 'center';
                    ctx.fillText('⭐', player.x + player.w/2, player.y - 8);
                    ctx.shadowBlur = 0;
                } else if (player.hasMushroom) {
                    ctx.fillStyle = '#ff6b35';
                    ctx.font = '14px "Courier New"';
                    ctx.textAlign = 'center';
                    ctx.fillText('🍄', player.x + player.w/2, player.y - 6);
                }
            }

            // Game Over / Win
            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, 800, 400);
                ctx.fillStyle = '#ff6b6b';
                ctx.shadowColor = '#ff6b6b';
                ctx.shadowBlur = 30;
                ctx.font = 'bold 48px "Courier New"';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('💀 GAME OVER', 400, 160);
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#fff';
                ctx.font = '20px "Courier New"';
                ctx.fillText('Clique em "Reiniciar" para jogar novamente', 400, 220);
                ctx.fillStyle = '#b6d4ff';
                ctx.font = '16px "Courier New"';
                ctx.fillText(`Pontuação: ${score}`, 400, 270);
            }

            if (win) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, 800, 400);
                
                if (currentLevel === MAX_LEVEL) {
                    // Vitória final - contra Bowser
                    ctx.fillStyle = '#FFD700';
                    ctx.shadowColor = '#FFD700';
                    ctx.shadowBlur = 40;
                    ctx.font = 'bold 48px "Courier New"';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('🏆 VOCÊ VENCEU!', 400, 140);
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#fff';
                    ctx.font = '24px "Courier New"';
                    ctx.fillText('🎉 BOWSER FOI DERROTADO!', 400, 200);
                    ctx.fillStyle = '#FFD700';
                    ctx.font = '20px "Courier New"';
                    ctx.fillText(`⭐ Pontuação final: ${score} ⭐`, 400, 250);
                    ctx.fillStyle = '#b6d4ff';
                    ctx.font = '18px "Courier New"';
                    ctx.fillText('Parabéns! Você salvou o Reino dos Cogumelos!', 400, 300);
                } else {
                    ctx.fillStyle = '#ffd700';
                    ctx.shadowColor = '#ffd700';
                    ctx.shadowBlur = 30;
                    ctx.font = 'bold 48px "Courier New"';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('🎉 FASE COMPLETA!', 400, 150);
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#fff';
                    ctx.font = '24px "Courier New"';
                    ctx.fillText(`Próxima fase: ${currentLevel + 1}/10`, 400, 210);
                    ctx.fillStyle = '#ffd700';
                    ctx.font = '20px "Courier New"';
                    ctx.fillText(`Pontuação: ${score}`, 400, 260);
                    ctx.fillStyle = '#b6d4ff';
                    ctx.font = '16px "Courier New"';
                    ctx.fillText('Pressione ESPAÇO para continuar', 400, 310);
                }
            }
        }

        // roundRect polyfill para canvas
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (r > w/2) r = w/2;
                if (r > h/2) r = h/2;
                this.moveTo(x + r, y);
                this.arcTo(x + w, y, x + w, y + h, r);
                this.arcTo(x + w, y + h, x, y + h, r);
                this.arcTo(x, y + h, x, y, r);
                this.arcTo(x, y, x + w, y, r);
                return this;
            };
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Tecla Espaço para continuar
        window.addEventListener('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                if (win) {
                    if (currentLevel === MAX_LEVEL) {
                        resetGame();
                    } else {
                        nextLevel();
                    }
                }
            }
        });

        // Inicializar com usuário padrão para teste
        if (!localStorage.getItem('marioUsers')) {
            const defaultUsers = {
                'admin': '1234',
                'mario': 'mario',
                'teste': '123'
            };
            saveUsers(defaultUsers);
        }

        console.log('✅ Jogo carregado!');
        console.log('🎮 Fases:');
        console.log('📌 1-6: Fases normais');
        console.log('👹 7: Larry Koopa');
        console.log('👹 8: Morton Koopa Jr');
        console.log('👹 9: Bowser Jr');
        console.log('👑 10: BOWSER (Final)');
    </script>
</body>
</html>
