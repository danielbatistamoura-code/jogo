<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Mario - 6 Fases + Personagens</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a2f5a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
        }
        .game-wrapper {
            background: #6b8cff;
            padding: 20px 20px 25px;
            border-radius: 24px;
            box-shadow: 0 12px 0 #3a5f8a, 0 8px 20px rgba(0, 0, 0, 0.6);
        }
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 16px;
            background: #5c94fc;
            box-shadow: inset 0 -6px 0 #3a6bb5, 0 0 0 4px #2d4f7a;
            image-rendering: pixelated;
            width: 800px;
            height: 400px;
        }
        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 14px;
            padding: 10px 20px;
            background: #1d3b5c;
            border-radius: 60px;
            color: #f0e68c;
            text-shadow: 2px 2px 0 #0a1a2b;
            box-shadow: inset 0 -4px 0 #0f2840, 0 4px 0 #0f1f30;
            font-weight: bold;
            font-size: 1.1rem;
            flex-wrap: wrap;
            gap: 8px;
        }
        .info-panel span {
            background: #2d4f7a;
            padding: 5px 16px;
            border-radius: 40px;
            box-shadow: inset 0 -3px 0 #16304d;
        }
        button {
            background: #f5c542;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
            color: #1d2f4a;
            box-shadow: 0 6px 0 #b37b2a, 0 4px 10px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            transition: all 0.07s;
            font-family: inherit;
        }
        button:active {
            transform: translateY(5px);
            box-shadow: 0 1px 0 #b37b2a;
        }
        button:hover {
            background: #fdd95c;
        }
        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .key-hint {
            color: #b6d4ff;
            font-size: 0.8rem;
            background: #0f2840;
            padding: 6px 12px;
            border-radius: 40px;
            letter-spacing: 1px;
        }
        .level-badge {
            background: #e53935;
            padding: 5px 18px;
            border-radius: 40px;
            color: #fff;
            text-shadow: 1px 1px 0 #7a1a1a;
        }
        .char-select {
            display: flex;
            gap: 6px;
            align-items: center;
            background: #0f2840;
            padding: 4px 12px 4px 16px;
            border-radius: 40px;
        }
        .char-btn {
            background: transparent;
            border: 2px solid transparent;
            border-radius: 30px;
            padding: 2px 10px;
            font-size: 0.9rem;
            box-shadow: none;
            color: #b6d4ff;
            transition: all 0.2s;
        }
        .char-btn:hover {
            background: #2d4f7a;
            transform: scale(1.05);
        }
        .char-btn.active {
            border-color: #f5c542;
            background: #2d4f7a;
            color: #fff;
        }
        .loading {
            color: #fff;
            text-align: center;
            padding: 10px;
            font-size: 1.2rem;
        }
        @media (max-width: 860px) {
            canvas {
                width: 100%;
                height: auto;
                aspect-ratio: 800/400;
            }
            .game-wrapper {
                padding: 12px;
                width: 96vw;
            }
            .info-panel {
                font-size: 0.9rem;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        <div class="info-panel">
            <div>
                <span>🪙 <span id="coinDisplay">0</span></span>
                <span style="margin-left: 10px;">🏆 <span id="scoreDisplay">0</span></span>
                <span style="margin-left: 10px;" class="level-badge">Fase <span id="levelDisplay">1</span>/6</span>
            </div>
            <div class="controls">
                <div class="char-select">
                    <span style="color:#b6d4ff;font-size:0.8rem;">👤</span>
                    <button class="char-btn active" data-char="mario">Mario</button>
                    <button class="char-btn" data-char="luigi">Luigi</button>
                    <button class="char-btn" data-char="toad">Toad</button>
                </div>
                <span class="key-hint">← ↑ →</span>
                <button id="restartBtn">↺ Reiniciar</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const coinSpan = document.getElementById('coinDisplay');
            const scoreSpan = document.getElementById('scoreDisplay');
            const levelSpan = document.getElementById('levelDisplay');

            const GROUND_Y = 340;
            const GRAVITY = 0.55;
            const MAX_LEVEL = 6;

            // --- Carregar imagem do Mario ---
            const marioImg = new Image();
            marioImg.src = 'mario.png';
            let marioLoaded = false;
            
            marioImg.onload = function() {
                marioLoaded = true;
                console.log('Imagem do Mario carregada com sucesso!');
            };
            
            marioImg.onerror = function() {
                console.warn('Não foi possível carregar mario.png. Usando fallback visual.');
                marioLoaded = false;
            };

            // --- Personagens ---
            const CHARACTERS = {
                mario: {
                    name: 'Mario',
                    color1: '#e53935',
                    color2: '#1e3a8a',
                    skin: '#f5c542',
                    jump: -10,
                    speed: 4.5,
                    w: 32,
                    h: 40
                },
                luigi: {
                    name: 'Luigi',
                    color1: '#43a047',
                    color2: '#1e3a8a',
                    skin: '#f5c542',
                    jump: -11,
                    speed: 5.0,
                    w: 32,
                    h: 42
                },
                toad: {
                    name: 'Toad',
                    color1: '#e53935',
                    color2: '#f5f5f5',
                    skin: '#f5c542',
                    jump: -9,
                    speed: 4.0,
                    w: 30,
                    h: 34
                }
            };

            let selectedChar = 'mario';
            let charStats = { ...CHARACTERS.mario };

            // --- Estado do Jogo ---
            let gameOver = false;
            let win = false;
            let score = 0;
            let coins = 0;
            let currentLevel = 1;
            let bossDefeated = false;
            let bossActive = false;

            // --- Player ---
            const player = {
                x: 60,
                y: GROUND_Y - 40,
                w: 32,
                h: 40,
                vy: 0,
                onGround: false,
                facing: 1,
                frame: 0,
                frameCounter: 0,
                invincible: 0,
            };

            // --- Estruturas do jogo ---
            let platforms = [];
            let coinObjects = [];
            let enemies = [];
            let boss = null;
            let flag = { x: 760, y: GROUND_Y - 80, w: 20, h: 80 };

            // --- Teclas ---
            const keys = { left: false, right: false, up: false };

            // --- Listeners ---
            function keydownHandler(e) {
                const key = e.key;
                if (key === 'ArrowLeft' || key === 'Left' || key === 'a' || key === 'A') {
                    keys.left = true;
                    e.preventDefault();
                } else if (key === 'ArrowRight' || key === 'Right' || key === 'd' || key === 'D') {
                    keys.right = true;
                    e.preventDefault();
                } else if (key === 'ArrowUp' || key === 'Up' || key === 'w' || key === 'W' || key === ' ') {
                    keys.up = true;
                    e.preventDefault();
                    if (!gameOver && !win) tryJump();
                }
            }

            function keyupHandler(e) {
                const key = e.key;
                if (key === 'ArrowLeft' || key === 'Left' || key === 'a' || key === 'A') {
                    keys.left = false;
                    e.preventDefault();
                } else if (key === 'ArrowRight' || key === 'Right' || key === 'd' || key === 'D') {
                    keys.right = false;
                    e.preventDefault();
                } else if (key === 'ArrowUp' || key === 'Up' || key === 'w' || key === 'W' || key === ' ') {
                    keys.up = false;
                    e.preventDefault();
                }
            }

            window.addEventListener('keydown', keydownHandler);
            window.addEventListener('keyup', keyupHandler);
            window.addEventListener('contextmenu', e => e.preventDefault());

            // --- Funções Auxiliares ---
            function tryJump() {
                if (gameOver || win) return;
                if (player.onGround) {
                    player.vy = charStats.jump;
                    player.onGround = false;
                }
            }

            function rectCollide(r1, r2) {
                return r1.x < r2.x + r2.w &&
                    r1.x + r1.w > r2.x &&
                    r1.y < r2.y + r2.h &&
                    r1.y + r1.h > r2.y;
            }

            function applyCharStats() {
                const stats = CHARACTERS[selectedChar];
                charStats = { ...stats };
                player.w = stats.w;
                player.h = stats.h;
                player.y = GROUND_Y - player.h;
            }

            // --- Carregar Fase ---
            function loadLevel(level) {
                bossDefeated = false;
                bossActive = false;
                boss = null;
                player.x = 60;
                player.y = GROUND_Y - player.h;
                player.vy = 0;
                player.onGround = false;
                player.invincible = 0;
                flag.x = 760;

                platforms = [{ x: 0, y: GROUND_Y, w: 800, h: 12, type: 'ground' }];
                coinObjects = [];
                enemies = [];

                if (level === 1) {
                    platforms.push({ x: 150, y: 280, w: 80, h: 18, type: 'brick' });
                    platforms.push({ x: 320, y: 220, w: 80, h: 18, type: 'brick' });
                    platforms.push({ x: 500, y: 280, w: 80, h: 18, type: 'brick' });
                    platforms.push({ x: 650, y: 220, w: 80, h: 18, type: 'brick' });
                    platforms.push({ x: 400, y: 140, w: 32, h: 32, type: 'question', hasCoin: true });
                    coinObjects = [
                        { x: 190, y: 250, w: 18, h: 18, collected: false },
                        { x: 360, y: 190, w: 18, h: 18, collected: false },
                        { x: 540, y: 250, w: 18, h: 18, collected: false },
                        { x: 690, y: 190, w: 18, h: 18, collected: false },
                    ];
                    enemies = [
                        { x: 250, y: GROUND_Y - 28, w: 28, h: 28, vx: -1.2, active: true, type: 'goomba' },
                        { x: 450, y: GROUND_Y - 28, w: 28, h: 28, vx: 1.0, active: true, type: 'goomba' },
                    ];
                } else if (level === 2) {
                    platforms.push({ x: 100, y: 290, w: 70, h: 18, type: 'brick' });
                    platforms.push({ x: 240, y: 230, w: 70, h: 18, type: 'brick' });
                    platforms.push({ x: 380, y: 180, w: 70, h: 18, type: 'brick' });
                    platforms.push({ x: 520, y: 240, w: 70, h: 18, type: 'brick' });
                    platforms.push({ x: 660, y: 190, w: 70, h: 18, type: 'brick' });
                    platforms.push({ x: 350, y: 120, w: 32, h: 32, type: 'question', hasCoin: true });
                    coinObjects = [
                        { x: 140, y: 260, w: 18, h: 18, collected: false },
                        { x: 280, y: 200, w: 18, h: 18, collected: false },
                        { x: 420, y: 150, w: 18, h: 18, collected: false },
                        { x: 560, y: 210, w: 18, h: 18, collected: false },
                        { x: 700, y: 160, w: 18, h: 18, collected: false },
                    ];
                    enemies = [
                        { x: 180, y: GROUND_Y - 28, w: 28, h: 28, vx: -1.5, active: true, type: 'goomba' },
                        { x: 400, y: GROUND_Y - 28, w: 28, h: 28, vx: 1.2, active: true, type: 'goomba' },
                        { x: 600, y: GROUND_Y - 28, w: 28, h: 28, vx: -1.8, active: true, type: 'goomba' },
                    ];
                } else if (level === 3) {
                    platforms.push({ x: 80, y: 290, w: 70, h: 18, type: 'brick' });
                    platforms.push({ x: 210, y: 230, w: 70, h: 18, type: 'brick' });
                    platforms.push({ x: 340, y: 170, w: 70, h: 18, type: 'brick' });
                    platforms.push({ x: 470, y: 230, w: 70, h: 18, type: 'brick' });
                    platforms.push({ x: 600, y: 170, w: 70, h: 18, type: 'brick' });
                    platforms.push({ x: 300, y: 110, w: 32, h: 32, type: 'question', hasCoin: true });
                    coinObjects = [
                        { x: 120, y: 260, w: 18, h: 18, collected: false },
                        { x: 250, y: 200, w: 18, h: 18, collected: false },
                        { x: 380, y: 140, w: 18, h: 18, collected: false },
                        { x: 510, y: 200, w: 18, h: 18, collected: false },
                        { x: 640, y: 140, w: 18, h: 18, collected: false },
                    ];
                    enemies = [
                        { x: 150, y: GROUND_Y - 28, w: 28, h: 28, vx: -1.5, active: true, type: 'goomba' },
                        { x: 500, y: GROUND_Y - 28, w: 28, h: 28, vx: 1.5, active: true, type: 'goomba' },
                    ];
                    boss = {
                        x: 720,
                        y: GROUND_Y - 64,
                        w: 48,
                        h: 64,
                        vx: -1.8,
                        active: true,
                        hp: 3,
                        maxHp: 3,
                        hitCooldown: 0,
                        type: 'boss'
                    };
                    bossActive = true;
                    flag.x = 780;
                } else if (level === 4) {
                    platforms.push({ x: 60, y: 300, w: 60, h: 18, type: 'brick' });
                    platforms.push({ x: 180, y: 240, w: 60, h: 18, type: 'brick' });
                    platforms.push({ x: 300, y: 180, w: 60, h: 18, type: 'brick' });
                    platforms.push({ x: 420, y: 240, w: 60, h: 18, type: 'brick' });
                    platforms.push({ x: 540, y: 180, w: 60, h: 18, type: 'brick' });
                    platforms.push({ x: 660, y: 240, w: 60, h: 18, type: 'brick' });
                    platforms.push({ x: 200, y: 120, w: 32, h: 32, type: 'question', hasCoin: true });
                    platforms.push({ x: 500, y: 120, w: 32, h: 32, type: 'question', hasCoin: true });
                    coinObjects = [
                        { x: 100, y: 270, w: 18, h: 18, collected: false },
                        { x: 220, y: 210, w: 18, h: 18, collected: false },
                        { x: 340, y: 150, w: 18, h: 18, collected: false },
                        { x: 460, y: 210, w: 18, h: 18, collected: false },
                        { x: 580, y: 150, w: 18, h: 18, collected: false },
                        { x: 700, y: 210, w: 18, h: 18, collected: false },
                    ];
                    enemies = [
                        { x: 120, y: GROUND_Y - 28, w: 28, h: 28, vx: -1.2, active: true, type: 'goomba' },
                        { x: 350, y: GROUND_Y - 28, w: 28, h: 28, vx: 1.3, active: true, type: 'goomba' },
                        { x: 580, y: GROUND_Y - 28, w: 28, h: 28, vx: -1.6, active: true, type: 'goomba' },
                    ];
                    boss = {
                        x: 720,
                        y: GROUND_Y - 64,
                        w: 48,
                        h: 64,
                        vx: -2.0,
                        active: true,
                        hp: 4,
                        maxHp: 4,
                        hitCooldown: 0,
                        type: 'boss'
                    };
                    bossActive = true;
                    flag.x = 780;
                } else if (level === 5) {
                    platforms.push({ x: 50, y: 300, w: 60, h: 18, type: 'brick' });
                    platforms.push({ x: 160, y: 250, w: 60, h: 18, type: 'brick' });
                    platforms.push({ x: 270, y: 190, w: 60, h: 18, type: 'brick' });
                    platforms.push({ x: 380, y: 130, w: 60, h: 18, type: 'brick' });
                    platforms.push({ x: 490, y: 190, w: 60, h: 18, type: 'brick' });
                    platforms.push({ x: 600, y: 250, w: 60, h: 18, type: 'brick' });
                    platforms.push({ x: 710, y: 190, w: 60, h: 18, type: 'brick' });
                    platforms.push({ x: 150, y: 90, w: 32, h: 32, type: 'question', hasCoin: true });
                    platforms.push({ x: 450, y: 80, w: 32, h: 32, type: 'question', hasCoin: true });
                    coinObjects = [
                        { x: 90, y: 270, w: 18, h: 18, collected: false },
                        { x: 200, y: 220, w: 18, h: 18, collected: false },
                        { x: 310, y: 160, w: 18, h: 18, collected: false },
                        { x: 420, y: 100, w: 18, h: 18, collected: false },
                        { x: 530, y: 160, w: 18, h: 18, collected: false },
                        { x: 640, y: 220, w: 18, h: 18, collected: false },
                        { x: 750, y: 160, w: 18, h: 18, collected: false },
                    ];
                    enemies = [
                        { x: 100, y: GROUND_Y - 28, w: 28, h: 28, vx: -1.8, active: true, type: 'goomba' },
                        { x: 300, y: GROUND_Y - 28, w: 28, h: 28, vx: 1.5, active: true, type: 'goomba' },
                        { x: 500, y: GROUND_Y - 28, w: 28, h: 28, vx: -1.4, active: true, type: 'goomba' },
                        { x: 680, y: GROUND_Y - 28, w: 28, h: 28, vx: 1.7, active: true, type: 'goomba' },
                    ];
                    boss = {
                        x: 720,
                        y: GROUND_Y - 64,
                        w: 48,
                        h: 64,
                        vx: -2.2,
                        active: true,
                        hp: 5,
                        maxHp: 5,
                        hitCooldown: 0,
                        type: 'boss'
                    };
                    bossActive = true;
                    flag.x = 780;
                } else if (level === 6) {
                    platforms.push({ x: 30, y: 300, w: 50, h: 18, type: 'brick' });
                    platforms.push({ x: 130, y: 250, w: 50, h: 18, type: 'brick' });
                    platforms.push({ x: 230, y: 190, w: 50, h: 18, type: 'brick' });
                    platforms.push({ x: 330, y: 130, w: 50, h: 18, type: 'brick' });
                    platforms.push({ x: 430, y: 190, w: 50, h: 18, type: 'brick' });
                    platforms.push({ x: 530, y: 250, w: 50, h: 18, type: 'brick' });
                    platforms.push({ x: 630, y: 190, w: 50, h: 18, type: 'brick' });
                    platforms.push({ x: 730, y: 130, w: 50, h: 18, type: 'brick' });
                    platforms.push({ x: 100, y: 80, w: 32, h: 32, type: 'question', hasCoin: true });
                    platforms.push({ x: 350, y: 70, w: 32, h: 32, type: 'question', hasCoin: true });
                    platforms.push({ x: 600, y: 80, w: 32, h: 32, type: 'question', hasCoin: true });
                    coinObjects = [
                        { x: 70, y: 270, w: 18, h: 18, collected: false },
                        { x: 170, y: 220, w: 18, h: 18, collected: false },
                        { x: 270, y: 160, w: 18, h: 18, collected: false },
                        { x: 370, y: 100, w: 18, h: 18, collected: false },
                        { x: 470, y: 160, w: 18, h: 18, collected: false },
                        { x: 570, y: 220, w: 18, h: 18, collected: false },
                        { x: 670, y: 160, w: 18, h: 18, collected: false },
                        { x: 770, y: 100, w: 18, h: 18, collected: false },
                    ];
                    enemies = [
                        { x: 80, y: GROUND_Y - 28, w: 28, h: 28, vx: -2.0, active: true, type: 'goomba' },
                        { x: 250, y: GROUND_Y - 28, w: 28, h: 28, vx: 1.8, active: true, type: 'goomba' },
                        { x: 420, y: GROUND_Y - 28, w: 28, h: 28, vx: -2.2, active: true, type: 'goomba' },
                        { x: 590, y: GROUND_Y - 28, w: 28, h: 28, vx: 1.6, active: true, type: 'goomba' },
                        { x: 720, y: GROUND_Y - 28, w: 28, h: 28, vx: -1.9, active: true, type: 'goomba' },
                    ];
                    boss = {
                        x: 720,
                        y: GROUND_Y - 64,
                        w: 48,
                        h: 64,
                        vx: -2.5,
                        active: true,
                        hp: 6,
                        maxHp: 6,
                        hitCooldown: 0,
                        type: 'boss'
                    };
                    bossActive = true;
                    flag.x = 780;
                }

                levelSpan.textContent = level;
                updateDisplay();
            }

            // --- Reset Completo ---
            function resetGame() {
                gameOver = false;
                win = false;
                score = 0;
                coins = 0;
                currentLevel = 1;
                applyCharStats();
                loadLevel(currentLevel);
                updateDisplay();
            }

            // --- Avançar Fase ---
            function nextLevel() {
                if (currentLevel < MAX_LEVEL) {
                    currentLevel++;
                    loadLevel(currentLevel);
                    win = false;
                    gameOver = false;
                    bossDefeated = false;
                } else {
                    win = true;
                }
            }

            // --- Update ---
            function update() {
                if (gameOver || win) return;

                if (player.invincible > 0) player.invincible--;

                // Movimento horizontal
                if (keys.left) {
                    player.x -= charStats.speed;
                    player.facing = -1;
                }
                if (keys.right) {
                    player.x += charStats.speed;
                    player.facing = 1;
                }
                if (player.x < 0) player.x = 0;
                if (player.x + player.w > 800) player.x = 800 - player.w;

                // Gravidade
                player.vy += GRAVITY;
                player.y += player.vy;

                // Colisão com plataformas
                player.onGround = false;
                for (let p of platforms) {
                    if (player.vy >= 0 && rectCollide(player, p)) {
                        player.y = p.y - player.h;
                        player.vy = 0;
                        player.onGround = true;
                    }
                    if (p.type === 'question' && p.hasCoin && rectCollide(player, p)) {
                        p.hasCoin = false;
                        coins++;
                        score += 50;
                        updateDisplay();
                    }
                }

                // Coleta de moedas
                for (let coin of coinObjects) {
                    if (!coin.collected && rectCollide(player, coin)) {
                        coin.collected = true;
                        coins++;
                        score += 30;
                        updateDisplay();
                    }
                }

                // Inimigos
                for (let enemy of enemies) {
                    if (!enemy.active) continue;
                    enemy.x += enemy.vx;
                    if (enemy.x < 10 || enemy.x + enemy.w > 790) enemy.vx *= -1;

                    if (rectCollide(player, enemy)) {
                        if (player.vy > 0 && player.y + player.h - enemy.y < 25) {
                            enemy.active = false;
                            score += 100;
                            player.vy = -6;
                            updateDisplay();
                        } else if (player.invincible === 0) {
                            player.invincible = 60;
                            score = Math.max(0, score - 50);
                            updateDisplay();
                            player.vy = -6;
                            player.x += (player.facing > 0) ? -30 : 30;
                        }
                    }
                }

                // Boss
                if (boss && boss.active && bossActive) {
                    boss.x += boss.vx;
                    if (boss.x < 600 || boss.x + boss.w > 780) boss.vx *= -1;

                    if (rectCollide(player, boss)) {
                        if (player.vy > 0 && player.y + player.h - boss.y < 30 && boss.hitCooldown === 0) {
                            boss.hp--;
                            boss.hitCooldown = 30;
                            player.vy = -8;
                            score += 200;
                            updateDisplay();
                            if (boss.hp <= 0) {
                                boss.active = false;
                                bossDefeated = true;
                                score += 500;
                                updateDisplay();
                            }
                        } else if (player.invincible === 0 && boss.active) {
                            player.invincible = 60;
                            score = Math.max(0, score - 80);
                            updateDisplay();
                            player.vy = -7;
                            player.x += (player.facing > 0) ? -40 : 40;
                        }
                    }
                    if (boss.hitCooldown > 0) boss.hitCooldown--;
                }

                // Bandeira (vitória)
                const canWin = !bossActive || (boss && !boss.active);
                if (canWin && rectCollide(player, { x: flag.x - 6, y: flag.y, w: flag.w + 12, h: flag.h })) {
                    win = true;
                    score += 200;
                    updateDisplay();
                    if (currentLevel < MAX_LEVEL) {
                        setTimeout(() => {
                            if (!gameOver) nextLevel();
                        }, 800);
                    }
                    return;
                }

                // Queda
                if (player.y > 420) {
                    gameOver = true;
                    return;
                }

                // Animação
                if (keys.left || keys.right) {
                    player.frameCounter++;
                    if (player.frameCounter > 6) {
                        player.frameCounter = 0;
                        player.frame = (player.frame + 1) % 4;
                    }
                } else {
                    player.frame = 0;
                    player.frameCounter = 0;
                }

                updateDisplay();
            }

            // --- Desenho ---
            function draw() {
                ctx.clearRect(0, 0, 800, 400);

                // Fundo
                const grad = ctx.createLinearGradient(0, 0, 0, 400);
                grad.addColorStop(0, '#5c94fc');
                grad.addColorStop(0.7, '#88b0ff');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, 800, 400);

                // Nuvens
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                drawCloud(100, 50, 40);
                drawCloud(300, 30, 50);
                drawCloud(600, 60, 45);
                drawCloud(450, 80, 35);

                // Chão
                ctx.fillStyle = '#4caf50';
                ctx.fillRect(0, GROUND_Y, 800, 12);
                ctx.fillStyle = '#8bc34a';
                ctx.fillRect(0, GROUND_Y - 3, 800, 6);
                ctx.fillStyle = '#6d4c2a';
                ctx.fillRect(0, GROUND_Y + 12, 800, 60);

                // Plataformas
                for (let p of platforms) {
                    if (p.type === 'brick') {
                        ctx.fillStyle = '#c67b30';
                        ctx.fillRect(p.x, p.y, p.w, p.h);
                        ctx.fillStyle = '#b56a1f';
                        ctx.fillRect(p.x + 4, p.y - 2, p.w - 8, 4);
                    } else if (p.type === 'question') {
                        ctx.fillStyle = '#f5c542';
                        ctx.fillRect(p.x, p.y, p.w, p.h);
                        ctx.fillStyle = '#dba52a';
                        ctx.fillRect(p.x + 4, p.y + 4, p.w - 8, p.h - 8);
                        ctx.fillStyle = '#b37b1a';
                        ctx.font = 'bold 20px "Courier New"';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText('?', p.x + p.w / 2, p.y + p.h / 2 + 2);
                        if (p.hasCoin) {
                            ctx.fillStyle = '#ffd966';
                            ctx.fillRect(p.x + 6, p.y - 10, 20, 8);
                        }
                    }
                }

                // Moedas
                for (let coin of coinObjects) {
                    if (coin.collected) continue;
                    ctx.fillStyle = '#ffd700';
                    ctx.beginPath();
                    ctx.arc(coin.x + 9, coin.y + 9, 9, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#ff8c00';
                    ctx.fillRect(coin.x + 8, coin.y + 4, 2, 10);
                }

                // Inimigos
                for (let enemy of enemies) {
                    if (!enemy.active) continue;
                    ctx.fillStyle = '#8d6e63';
                    ctx.fillRect(enemy.x, enemy.y, enemy.w, enemy.h);
                    ctx.fillStyle = '#5d4037';
                    ctx.fillRect(enemy.x + 4, enemy.y - 4, enemy.w - 8, 6);
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(enemy.x + 6, enemy.y + 6, 6, 6);
                    ctx.fillRect(enemy.x + 16, enemy.y + 6, 6, 6);
                    ctx.fillStyle = '#000';
                    ctx.fillRect(enemy.x + 8, enemy.y + 8, 3, 3);
                    ctx.fillRect(enemy.x + 18, enemy.y + 8, 3, 3);
                }

                // Boss
                if (boss && boss.active && bossActive) {
                    ctx.fillStyle = '#c62828';
                    ctx.fillRect(boss.x, boss.y, boss.w, boss.h);
                    ctx.fillStyle = '#b71c1c';
                    ctx.fillRect(boss.x + 4, boss.y - 6, boss.w - 8, 8);
                    ctx.fillStyle = '#ffeb3b';
                    ctx.fillRect(boss.x + 8, boss.y + 8, 8, 8);
                    ctx.fillRect(boss.x + 32, boss.y + 8, 8, 8);
                    ctx.fillStyle = '#000';
                    ctx.fillRect(boss.x + 12, boss.y + 12, 3, 3);
                    ctx.fillRect(boss.x + 36, boss.y + 12, 3, 3);
                    // Barra de vida do boss
                    ctx.fillStyle = '#000';
                    ctx.fillRect(boss.x, boss.y - 16, boss.w, 8);
                    ctx.fillStyle = '#4caf50';
                    ctx.fillRect(boss.x + 2, boss.y - 14, (boss.w - 4) * (boss.hp / boss.maxHp), 4);
                    ctx.fillStyle = '#fff';
                    ctx.font = '10px "Courier New"';
                    ctx.textAlign = 'center';
                    ctx.fillText('BOSS', boss.x + boss.w / 2, boss.y - 18);
                }

                // Bandeira
                ctx.fillStyle = '#78909c';
                ctx.fillRect(flag.x, flag.y, 4, flag.h);
                ctx.fillStyle = '#e53935';
                ctx.beginPath();
                ctx.moveTo(flag.x + 4, flag.y + 4);
                ctx.lineTo(flag.x + 34, flag.y + 14);
                ctx.lineTo(flag.x + 4, flag.y + 24);
                ctx.fill();
                ctx.fillStyle = '#ffd54f';
                ctx.font = '14px "Courier New"';
                ctx.textAlign = 'center';
                ctx.fillText('★', flag.x + 19, flag.y + 18);

                // --- Player (com imagem do Mario) ---
                if (player.invincible > 0 && Math.floor(player.invincible / 4) % 2 === 0) {
                    // Pisca quando invencível
                } else {
                    if (marioLoaded) {
                        // Desenha a imagem do Mario
                        const imgWidth = player.w * 1.5;
                        const imgHeight = player.h * 1.5;
                        const offsetX = (imgWidth - player.w) / 2;
                        const offsetY = (imgHeight - player.h) / 2;
                        
                        // Espelha a imagem se estiver virado para esquerda
                        if (player.facing < 0) {
                            ctx.save();
                            ctx.translate(player.x + player.w / 2, player.y + player.h / 2);
                            ctx.scale(-1, 1);
                            ctx.drawImage(marioImg, -imgWidth/2, -imgHeight/2, imgWidth, imgHeight);
                            ctx.restore();
                        } else {
                            ctx.drawImage(marioImg, player.x - offsetX, player.y - offsetY, imgWidth, imgHeight);
                        }
                    } else {
                        // Fallback: desenha o personagem com formas geométricas
                        // Corpo
                        ctx.fillStyle = charStats.color1;
                        ctx.fillRect(player.x, player.y + 10, player.w, player.h - 10);
                        // Cabeça
                        ctx.fillStyle = charStats.skin;
                        ctx.fillRect(player.x + 4, player.y, player.w - 8, 14);
                        // Chapéu
                        ctx.fillStyle = charStats.color1;
                        ctx.fillRect(player.x + 2, player.y - 4, player.w - 4, 8);
                        // Olhos
                        ctx.fillStyle = '#fff';
                        ctx.fillRect(player.x + (player.facing > 0 ? 18 : 6), player.y + 4, 6, 6);
                        ctx.fillStyle = '#000';
                        ctx.fillRect(player.x + (player.facing > 0 ? 20 : 8), player.y + 6, 3, 3);
                        // Botas
                        ctx.fillStyle = '#4e342e';
                        ctx.fillRect(player.x + 2, player.y + player.h - 4, 10, 4);
                        ctx.fillRect(player.x + player.w - 12, player.y + player.h - 4, 10, 4);
                    }
                }

                // Game Over / Win
                if (gameOver) {
                    ctx.fillStyle = 'rgba(0,0,0,0.6)';
                    ctx.fillRect(0, 0, 800, 400);
                    ctx.fillStyle = '#e53935';
                    ctx.font = 'bold 60px "Courier New"';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('GAME OVER', 400, 180);
                    ctx.fillStyle = '#fff';
                    ctx.font = '24px "Courier New"';
                    ctx.fillText('Pressione Reiniciar', 400, 250);
                } else if (win) {
                    ctx.fillStyle = 'rgba(0,0,0,0.5)';
                    ctx.fillRect(0, 0, 800, 400);
                    ctx.fillStyle = '#ffd700';
                    ctx.font = 'bold 52px "Courier New"';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    if (currentLevel === MAX_LEVEL) {
                        ctx.fillText('🏆 VOCÊ VENCEU! 🏆', 400, 170);
                        ctx.fillStyle = '#fff';
                        ctx.font = '28px "Courier New"';
                        ctx.fillText('Parabéns! Você completou todas as 6 fases!', 400, 240);
                    } else {
                        ctx.fillText('⭐ FASE COMPLETA! ⭐', 400, 170);
                        ctx.fillStyle = '#fff';
                        ctx.font = '24px "Courier New"';
                        ctx.fillText('Avançando para a próxima fase...', 400, 240);
                    }
                }

                updateDisplay();
            }

            // --- Desenhar Nuvem ---
            function drawCloud(x, y, size) {
                ctx.beginPath();
                ctx.arc(x, y, size * 0.5, 0, Math.PI * 2);
                ctx.arc(x + size * 0.4, y - size * 0.2, size * 0.4, 0, Math.PI * 2);
                ctx.arc(x + size * 0.7, y, size * 0.3, 0, Math.PI * 2);
                ctx.fill();
            }

            // --- Atualizar Display ---
            function updateDisplay() {
                coinSpan.textContent = coins;
                scoreSpan.textContent = score;
                levelSpan.textContent = currentLevel;
            }

            // --- Loop Principal ---
            function gameLoop() {
                update();
                draw();
                requestAnimationFrame(gameLoop);
            }

            // --- Eventos dos Botões ---
            document.querySelectorAll('.char-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.char-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    selectedChar = this.dataset.char;
                    applyCharStats();
                    if (!gameOver && !win) {
                        player.y = GROUND_Y - player.h;
                        player.x = 60;
                    }
                });
            });

            document.getElementById('restartBtn').addEventListener('click', function() {
                resetGame();
            });

            // --- Inicialização ---
            applyCharStats();
            loadLevel(1);
            gameLoop();

            // Mensagem de carregamento da imagem
            console.log('Certifique-se de que o arquivo "mario.png" está na mesma pasta do HTML.');
            console.log('Se a imagem não carregar, o jogo usará o design alternativo.');

        })();
    </script>
</body>
</html>
