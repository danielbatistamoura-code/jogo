<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Mario - 6 Fases + Personagens</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a2f5a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
        }
        .game-wrapper {
            background: #6b8cff;
            padding: 20px 20px 25px;
            border-radius: 24px;
            box-shadow: 0 12px 0 #3a5f8a, 0 8px 20px rgba(0, 0, 0, 0.6);
        }
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 16px;
            background: #5c94fc;
            box-shadow: inset 0 -6px 0 #3a6bb5, 0 0 0 4px #2d4f7a;
            image-rendering: pixelated;
            width: 800px;
            height: 400px;
        }
        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 14px;
            padding: 10px 20px;
            background: #1d3b5c;
            border-radius: 60px;
            color: #f0e68c;
            text-shadow: 2px 2px 0 #0a1a2b;
            box-shadow: inset 0 -4px 0 #0f2840, 0 4px 0 #0f1f30;
            font-weight: bold;
            font-size: 1.1rem;
            flex-wrap: wrap;
            gap: 8px;
        }
        .info-panel span {
            background: #2d4f7a;
            padding: 5px 16px;
            border-radius: 40px;
            box-shadow: inset 0 -3px 0 #16304d;
        }
        button {
            background: #f5c542;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
            color: #1d2f4a;
            box-shadow: 0 6px 0 #b37b2a, 0 4px 10px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            transition: all 0.07s;
            font-family: inherit;
        }
        button:active {
            transform: translateY(5px);
            box-shadow: 0 1px 0 #b37b2a;
        }
        button:hover {
            background: #fdd95c;
        }
        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .key-hint {
            color: #b6d4ff;
            font-size: 0.8rem;
            background: #0f2840;
            padding: 6px 12px;
            border-radius: 40px;
            letter-spacing: 1px;
        }
        .level-badge {
            background: #e53935;
            padding: 5px 18px;
            border-radius: 40px;
            color: #fff;
            text-shadow: 1px 1px 0 #7a1a1a;
        }
        .char-select {
            display: flex;
            gap: 6px;
            align-items: center;
            background: #0f2840;
            padding: 4px 12px 4px 16px;
            border-radius: 40px;
        }
        .char-btn {
            background: transparent;
            border: 2px solid transparent;
            border-radius: 30px;
            padding: 2px 10px;
            font-size: 0.9rem;
            box-shadow: none;
            color: #b6d4ff;
            transition: all 0.2s;
        }
        .char-btn:hover {
            background: #2d4f7a;
            transform: scale(1.05);
        }
        .char-btn.active {
            border-color: #f5c542;
            background: #2d4f7a;
            color: #fff;
        }
        @media (max-width: 860px) {
            canvas {
                width: 100%;
                height: auto;
                aspect-ratio: 800/400;
            }
            .game-wrapper {
                padding: 12px;
                width: 96vw;
            }
            .info-panel {
                font-size: 0.9rem;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        <div class="info-panel">
            <div>
                <span>🪙 <span id="coinDisplay">0</span></span>
                <span style="margin-left: 10px;">🏆 <span id="scoreDisplay">0</span></span>
                <span style="margin-left: 10px;" class="level-badge">Fase <span id="levelDisplay">1</span>/6</span>
            </div>
            <div class="controls">
                <div class="char-select">
                    <span style="color:#b6d4ff;font-size:0.8rem;">👤</span>
                    <button class="char-btn active" data-char="mario">Mario</button>
                    <button class="char-btn" data-char="luigi">Luigi</button>
                    <button class="char-btn" data-char="toad">Toad</button>
                </div>
                <span class="key-hint">← ↑ →</span>
                <button id="restartBtn">↺ Reiniciar</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const coinSpan = document.getElementById('coinDisplay');
            const scoreSpan = document.getElementById('scoreDisplay');
            const levelSpan = document.getElementById('levelDisplay');

            const GROUND_Y = 340;
            const GRAVITY = 0.55;
            const MAX_LEVEL = 6;

            // --- Personagens ---
            const CHARACTERS = {
                mario: {
                    name: 'Mario',
                    color1: '#e53935',
                    color2: '#1e3a8a',
                    skin: '#f5c542',
                    jump: -10,
                    speed: 4.5,
                    w: 30,
                    h: 40
                },
                luigi: {
                    name: 'Luigi',
                    color1: '#43a047',
                    color2: '#1e3a8a',
                    skin: '#f5c542',
                    jump: -11,
                    speed: 5.0,
                    w: 30,
                    h: 42
                },
                toad: {
                    name: 'Toad',
                    color1: '#e53935',
                    color2: '#f5f5f5',
                    skin: '#f5c542',
                    jump: -9,
                    speed: 4.0,
                    w: 28,
                    h: 34
                }
            };

            let selectedChar = 'mario';
            let charStats = { ...CHARACTERS.mario };

            // --- Estado do Jogo ---
            let gameOver = false;
            let win = false;
            let score = 0;
            let coins = 0;
            let currentLevel = 1;
            let bossDefeated = false;
            let bossActive = false;
            let levelComplete = false;

            // --- Mário (player) ---
            const player = {
                x: 60,
                y: GROUND_Y - 40,
                w: 30,
                h: 40,
                vy: 0,
                onGround: false,
                facing: 1,
                frame: 0,
                frameCounter: 0,
                invincible: 0,
            };

            // --- Estruturas de cada fase ---
            let platforms = [];
            let coinObjects = [];
            let enemies = [];
            let boss = null;
            let flag = { x: 760, y: GROUND_Y - 80, w: 20, h: 80, flagY: 0 };

            // --- Teclas ---
            const keys = { left: false, right: false, up: false };

            // --- Listeners ---
            function keydownHandler(e) {
                const key = e.key;
                if (key === 'ArrowLeft' || key === 'Left' || key === 'a' || key === 'A') {
                    keys.left = true;
                    e.preventDefault();
                } else if (key === 'ArrowRight' || key === 'Right' || key === 'd' || key === 'D') {
                    keys.right = true;
                    e.preventDefault();
                } else if (key === 'ArrowUp' || key === 'Up' || key === 'w' || key === 'W' || key === ' ') {
                    keys.up = true;
                    e.preventDefault();
                    if (!gameOver && !win) tryJump();
                }
            }

            function keyupHandler(e) {
                const key = e.key;
                if (key === 'ArrowLeft' || key === 'Left' || key === 'a' || key === 'A') {
                    keys.left = false;
                    e.preventDefault();
                } else if (key === 'ArrowRight' || key === 'Right' || key === 'd' || key === 'D') {
                    keys.right = false;
                    e.preventDefault();
                } else if (key === 'ArrowUp' || key === 'Up' || key === 'w' || key === 'W' || key === ' ') {
                    keys.up = false;
                    e.preventDefault();
                }
            }
            window.addEventListener('keydown', keydownHandler);
            window.addEventListener('keyup', keyupHandler);
            window.addEventListener('contextmenu', e => e.preventDefault());

            // --- Funções Auxiliares ---
            function tryJump() {
                if (gameOver || win) return;
                if (player.onGround) {
                    player.vy = charStats.jump;
                    player.onGround = false;
                }
            }

            function rectCollide(r1, r2) {
                return r1.x < r2.x + r2.w &&
                    r1.x + r1.w > r2.x &&
                    r1.y < r2.y + r2.h &&
                    r1.y + r1.h > r2.y;
            }

            function applyCharStats() {
                const stats = CHARACTERS[selectedChar];
                charStats = { ...stats };
                player.w = stats.w;
                player.h = stats.h;
            }

            // --- Carregar Fase ---
            function loadLevel(level) {
                levelComplete = false;
                bossDefeated = false;
                bossActive = false;
                boss = null;
                player.x = 60;
                player.y = GROUND_Y - player.h;
                player.vy = 0;
                player.onGround = false;
                player.invincible = 0;
                flag.flagY = 0;
                flag.x = 760;

                // Plataformas base
                platforms = [
                    { x: 0, y: GROUND_Y, w: 800, h: 12, type: 'ground' },
                ];

                coinObjects = [];
                enemies = [];

                // --- DEFINIR FASES ---
                if (level === 1) {
                    platforms.push({ x: 150, y: 280, w: 80, h: 18, type: 'brick' });
                    platforms.push({ x: 320, y: 220, w: 80, h: 18, type: 'brick' });
                    platforms.push({ x: 500, y: 280, w: 80, h: 18, type: 'brick' });
                    platforms.push({ x: 650, y: 220, w: 80, h: 18, type: 'brick' });
                    platforms.push({ x: 400, y: 140, w: 32, h: 32, type: 'question', hasCoin: true });
                    coinObjects = [
                        { x: 190, y: 250, w: 18, h: 18, collected: false },
                        { x: 360, y: 190, w: 18, h: 18, collected: false },
                        { x: 540, y: 250, w: 18, h: 18, collected: false },
                        { x: 690, y: 190, w: 18, h: 18, collected: false },
                    ];
                    enemies = [
                        { x: 250, y: GROUND_Y - 28, w: 28, h: 28, vx: -1.2, active: true, type: 'goomba' },
                        { x: 450, y: GROUND_Y - 28, w: 28, h: 28, vx: 1.0, active: true, type: 'goomba' },
                    ];
                } else if (level === 2) {
                    platforms.push({ x: 100, y: 290, w: 70, h: 18, type: 'brick' });
                    platforms.push({ x: 240, y: 230, w: 70, h: 18, type: 'brick' });
                    platforms.push({ x: 380, y: 180, w: 70, h: 18, type: 'brick' });
                    platforms.push({ x: 520, y: 240, w: 70, h: 18, type: 'brick' });
                    platforms.push({ x: 660, y: 190, w: 70, h: 18, type: 'brick' });
                    platforms.push({ x: 350, y: 120, w: 32, h: 32, type: 'question', hasCoin: true });
                    coinObjects = [
                        { x: 140, y: 260, w: 18, h: 18, collected: false },
                        { x: 280, y: 200, w: 18, h: 18, collected: false },
                        { x: 420, y: 150, w: 18, h: 18, collected: false },
                        { x: 560, y: 210, w: 18, h: 18, collected: false },
                        { x: 700, y: 160, w: 18, h: 18, collected: false },
                    ];
                    enemies = [
                        { x: 180, y: GROUND_Y - 28, w: 28, h: 28, vx: -1.5, active: true, type: 'goomba' },
                        { x: 400, y: GROUND_Y - 28, w: 28, h: 28, vx: 1.2, active: true, type: 'goomba' },
                        { x: 600, y: GROUND_Y - 28, w: 28, h: 28, vx: -1.8, active: true, type: 'goomba' },
                    ];
                } else if (level === 3) {
                    platforms.push({ x: 80, y: 290, w: 70, h: 18, type: 'brick' });
                    platforms.push({ x: 210, y: 230, w: 70, h: 18, type: 'brick' });
                    platforms.push({ x: 340, y: 170, w: 70, h: 18, type: 'brick' });
                    platforms.push({ x: 470, y: 230, w: 70, h: 18, type: 'brick' });
                    platforms.push({ x: 600, y: 170, w: 70, h: 18, type: 'brick' });
                    platforms.push({ x: 300, y: 110, w: 32, h: 32, type: 'question', hasCoin: true });
                    coinObjects = [
                        { x: 120, y: 260, w: 18, h: 18, collected: false },
                        { x: 250, y: 200, w: 18, h: 18, collected: false },
                        { x: 380, y: 140, w: 18, h: 18, collected: false },
                        { x: 510, y: 200, w: 18, h: 18, collected: false },
                        { x: 640, y: 140, w: 18, h: 18, collected: false },
                    ];
                    enemies = [
                        { x: 150, y: GROUND_Y - 28, w: 28, h: 28, vx: -1.5, active: true, type: 'goomba' },
                        { x: 500, y: GROUND_Y - 28, w: 28, h: 28, vx: 1.5, active: true, type: 'goomba' },
                    ];
                    boss = {
                        x: 720,
                        y: GROUND_Y - 64,
                        w: 48,
                        h: 64,
                        vx: -1.8,
                        active: true,
                        hp: 3,
                        maxHp: 3,
                        hitCooldown: 0,
                        type: 'boss'
                    };
                    bossActive = true;
                } else if (level === 4) {
                    platforms.push({ x: 60, y: 300, w: 60, h: 18, type: 'brick' });
                    platforms.push({ x: 180, y: 240, w: 60, h: 18, type: 'brick' });
                    platforms.push({ x: 300, y: 180, w: 60, h: 18, type: 'brick' });
                    platforms.push({ x: 420, y: 240, w: 60, h: 18, type: 'brick' });
                    platforms.push({ x: 540, y: 180, w: 60, h: 18, type: 'brick' });
                    platforms.push({ x: 660, y: 240, w: 60, h: 18, type: 'brick' });
                    platforms.push({ x: 200, y: 120, w: 32, h: 32, type: 'question', hasCoin: true });
                    platforms.push({ x: 500, y: 120, w: 32, h: 32, type: 'question', hasCoin: true });
                    coinObjects = [
                        { x: 100, y: 270, w: 18, h: 18, collected: false },
                        { x: 220, y: 210, w: 18, h: 18, collected: false },
                        { x: 340, y: 150, w: 18, h: 18, collected: false },
                        { x: 460, y: 210, w: 18, h: 18, collected: false },
                        { x: 580, y: 150, w: 18, h: 18, collected: false },
                        { x: 700, y: 210, w: 18, h: 18, collected: false },
                    ];
                    enemies = [
                        { x: 120, y: GROUND_Y - 28, w: 28, h: 28, vx: -1.2, active: true, type: 'goomba' },
                        { x: 350, y: GROUND_Y - 28, w: 28, h: 28, vx: 1.3, active: true, type: 'goomba' },
                        { x: 580, y: GROUND_Y - 28, w: 28, h: 28, vx: -1.6, active: true, type: 'goomba' },
                    ];
                    boss = {
                        x: 720,
                        y: GROUND_Y - 64,
                        w: 48,
                        h: 64,
                        vx: -2.0,
                        active: true,
                        hp: 4,
                        maxHp: 4,
                        hitCooldown: 0,
                        type: 'boss'
                    };
                    bossActive = true;
                } else if (level === 5) {
                    platforms.push({ x: 50, y: 300, w: 60, h: 18, type: 'brick' });
                    platforms.push({ x: 160, y: 250, w: 60, h: 18, type: 'brick' });
                    platforms.push({ x: 270, y: 190, w: 60, h: 18, type: 'brick' });
                    platforms.push({ x: 380, y: 130, w: 60, h: 18, type: 'brick' });
                    platforms.push({ x: 490, y: 190, w: 60, h: 18, type: 'brick' });
                    platforms.push({ x: 600, y: 250, w: 60, h: 18, type: 'brick' });
                    platforms.push({ x: 710, y: 190, w: 60, h: 18, type: 'brick' });
                    platforms.push({ x: 150, y: 90, w: 32, h: 32, type: 'question', hasCoin: true });
                    platforms.push({ x: 450, y: 80, w: 32, h: 32, type: 'question', hasCoin: true });
                    coinObjects = [
                        { x: 90, y: 270, w: 18, h: 18, collected: false },
                        { x: 200, y: 220, w: 18, h: 18, collected: false },
                        { x: 310, y: 160, w: 18, h: 18, collected: false },
                        { x: 420, y: 100, w: 18, h: 18, collected: false },
                        { x: 530, y: 160, w: 18, h: 18, collected: false },
                        { x: 640, y: 220, w: 18, h: 18, collected: false },
                        { x: 750, y: 160, w: 18, h: 18, collected: false },
                    ];
                    enemies = [
                        { x: 100, y: GROUND_Y - 28, w: 28, h: 28, vx: -1.8, active: true, type: 'goomba' },
                        { x: 300, y: GROUND_Y - 28, w: 28, h: 28, vx: 1.5, active: true, type: 'goomba' },
                        { x: 500, y: GROUND_Y - 28, w: 28, h: 28, vx: -1.4, active: true, type: 'goomba' },
                        { x: 680, y: GROUND_Y - 28, w: 28, h: 28, vx: 1.7, active: true, type: 'goomba' },
                    ];
                    boss = {
                        x: 720,
                        y: GROUND_Y - 64,
                        w: 48,
                        h: 64,
                        vx: -2.2,
                        active: true,
                        hp: 5,
                        maxHp: 5,
                        hitCooldown: 0,
                        type: 'boss'
                    };
                    bossActive = true;
                } else if (level === 6) {
                    // FASE FINAL - Desafio máximo
                    platforms.push({ x: 30, y: 300, w: 50, h: 18, type: 'brick' });
                    platforms.push({ x: 130, y: 250, w: 50, h: 18, type: 'brick' });
                    platforms.push({ x: 230, y: 190, w: 50, h: 18, type: 'brick' });
                    platforms.push({ x: 330, y: 130, w: 50, h: 18, type: 'brick' });
                    platforms.push({ x: 430, y: 190, w: 50, h: 18, type: 'brick' });
                    platforms.push({ x: 530, y: 250, w: 50, h: 18, type: 'brick' });
                    platforms.push({ x: 630, y: 190, w: 50, h: 18, type: 'brick' });
                    platforms.push({ x: 730, y: 130, w: 50, h: 18, type: 'brick' });
                    platforms.push({ x: 100, y: 80, w: 32, h: 32, type: 'question', hasCoin: true });
                    platforms.push({ x: 350, y: 70, w: 32, h: 32, type: 'question', hasCoin: true });
                    platforms.push({ x: 600, y: 80, w: 32, h: 32, type: 'question', hasCoin: true });
                    coinObjects = [
                        { x: 70, y: 270, w: 18, h: 18, collected: false },
                        { x: 170, y: 220, w: 18, h: 18, collected: false },
                        { x: 270, y: 160, w: 18, h: 18, collected: false },
                        { x: 370, y: 100, w: 18, h: 18, collected: false },
                        { x: 470, y: 160, w: 18, h: 18, collected: false },
                        { x: 570, y: 220, w: 18, h: 18, collected: false },
                        { x: 670, y: 160, w: 18, h: 18, collected: false },
                        { x: 770, y: 100, w: 18, h: 18, collected: false },
                    ];
                    enemies = [
                        { x: 80, y: GROUND_Y - 28, w: 28, h: 28, vx: -2.0, active: true, type: 'goomba' },
                        { x: 250, y: GROUND_Y - 28, w: 28, h: 28, vx: 1.8, active: true, type: 'goomba' },
                        { x: 420, y: GROUND_Y - 28, w: 28, h: 28, vx: -2.2, active: true, type: 'goomba' },
                        { x: 590, y: GROUND_Y - 28, w: 28, h: 28, vx: 1.6, active: true, type: 'goomba' },
                        { x: 720, y: GROUND_Y - 28, w: 28, h: 28, vx: -1.9, active: true, type: 'goomba' },
                    ];
                    boss = {
                        x: 720,
                        y: GROUND_Y - 64,
                        w: 48,
                        h: 64,
                        vx: -2.5,
                        active: true,
                        hp: 6,
                        maxHp: 6,
                        hitCooldown: 0,
                        type: 'boss'
                    };
                    bossActive = true;
                }

                // Ajusta a bandeira se tiver boss
                if (bossActive && boss) {
                    flag.x = 780;
                } else {
                    flag.x = 760;
                }

                levelSpan.textContent = level;
                updateDisplay();
            }

            // --- Reset Completo ---
            function resetGame() {
                gameOver = false;
                win = false;
                score = 0;
                coins = 0;
                currentLevel = 1;
                applyCharStats();
                loadLevel(currentLevel);
                updateDisplay();
            }

            // --- Avançar Fase ---
            function nextLevel() {
                if (currentLevel < MAX_LEVEL) {
                    currentLevel++;
                    loadLevel(currentLevel);
                    win = false;
                    gameOver = false;
                    bossDefeated = false;
                    levelComplete = false;
                } else {
                    win = true;
                }
            }

            // --- Update ---
            function update() {
                if (gameOver || win) return;

                if (player.invincible > 0) player.invincible--;

                // Movimento horizontal
                if (keys.left) {
                    player.x -= charStats.speed;
                    player.facing = -1;
                }
                if (keys.right) {
                    player.x += charStats.speed;
                    player.facing = 1;
                }
                if (player.x < 0) player.x = 0;
                if (player.x + player.w > 800) player.x = 800 - player.w;

                // Gravidade
                player.vy += GRAVITY;
                player.y += player.vy;

                // Colisão com plataformas
                player.onGround = false;
                for (let p of platforms) {
                    if (player.vy >= 0 && rectCollide(player, p)) {
                        player.y = p.y - player.h;
                        player.vy = 0;
                        player.onGround = true;
                    }
                    if (p.type === 'question' && p.hasCoin && rectCollide(player, p)) {
                        p.hasCoin = false;
                        coins++;
                        score += 50;
                        updateDisplay();
                    }
                }

                // Coleta de moedas
                for (let coin of coinObjects) {
                    if (!coin.collected && rectCollide(player, coin)) {
                        coin.collected = true;
                        coins++;
                        score += 30;
                        updateDisplay();
                    }
                }

                // Inimigos (Goombas)
                for (let enemy of enemies) {
                    if (!enemy.active) continue;
                    enemy.x += enemy.vx;
                    if (enemy.x < 10 || enemy.x + enemy.w > 790) enemy.vx *= -1;

                    if (rectCollide(player, enemy)) {
                        if (player.vy > 0 && player.y + player.h - enemy.y < 25) {
                            enemy.active = false;
                            score += 100;
                            player.vy = -6;
                            updateDisplay();
                        } else if (player.invincible === 0) {
                            player.invincible = 60;
                            score = Math.max(0, score - 50);
                            updateDisplay();
                            player.vy = -6;
                            player.x += (player.facing > 0) ? -30 : 30;
                        }
                    }
                }

                // BOSS
                if (boss && boss.active && bossActive) {
                    boss.x += boss.vx;
                    if (boss.x < 600 || boss.x + boss.w > 780) boss.vx *= -1;

                    if (rectCollide(player, boss)) {
                        if (player.vy > 0 && player.y + player.h - boss.y < 30 && boss.hitCooldown === 0) {
                            boss.hp--;
                            boss.hitCooldown = 30;
                            player.vy = -8;
                            score += 200;
                            updateDisplay();
                            if (boss.hp <= 0) {
                                boss.active = false;
                                bossDefeated = true;
                                score += 500;
                                updateDisplay();
                            }
                        } else if (player.invincible === 0 && boss.active) {
                            player.invincible = 60;
                            score = Math.max(0, score - 80);
                            updateDisplay();
                            player.vy = -7;
                            player.x += (player.facing > 0) ? -40 : 40;
                        }
                    }
                    if (boss.hitCooldown > 0) boss.hitCooldown--;
                }

                // Bandeira (vitória)
                const canWin = !bossActive || (boss && !boss.active);
                if (canWin && rectCollide(player, { x: flag.x - 6, y: flag.y, w: flag.w + 12, h: flag.h })) {
                    if (currentLevel === MAX_LEVEL && bossActive && boss && boss.active) {
                        // Não pode vencer com boss vivo
                    } else {
                        win = true;
                        score += 200;
                        updateDisplay();
                        if (currentLevel < MAX_LEVEL) {
                            setTimeout(() => {
                                if (!gameOver) nextLevel();
                            }, 800);
                        }
                        return;
                    }
                }

                // Queda
                if (player.y > 420) {
                    gameOver = true;
                    return;
                }

                // Animação
                if (keys.left || keys.right) {
                    player.frameCounter++;
                    if (player.frameCounter > 6) {
                        player.frameCounter = 0;
                        player.frame = (player.frame + 1) % 4;
                    }
                } else {
                    player.frame = 0;
                    player.frameCounter = 0;
                }

                updateDisplay();
            }
