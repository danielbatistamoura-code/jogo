<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Mario - 6 Fases + Power-ups</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a2f5a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
        }

        /* ===== TELA DE LOGIN / CADASTRO ===== */
        #loginScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(12px);
            animation: fadeIn 0.6s ease;
        }
        #loginScreen.hidden {
            display: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9) rotate(-2deg); }
            to { opacity: 1; transform: scale(1) rotate(0); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(-3deg); }
            50% { transform: translateY(-12px) rotate(3deg); }
        }

        @keyframes shine {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        .login-box {
            background: linear-gradient(145deg, #1d3b5c, #0f2840);
            padding: 45px 40px 35px;
            border-radius: 35px;
            box-shadow: 0 25px 0 #0a1a2b, 0 30px 60px rgba(0,0,0,0.8);
            text-align: center;
            width: 460px;
            max-width: 95vw;
            border: 3px solid #f5c542;
            position: relative;
            overflow: hidden;
            max-height: 95vh;
            overflow-y: auto;
        }

        .login-box::-webkit-scrollbar {
            width: 4px;
        }
        .login-box::-webkit-scrollbar-track {
            background: transparent;
        }
        .login-box::-webkit-scrollbar-thumb {
            background: #f5c542;
            border-radius: 10px;
        }

        .login-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, transparent 30%, rgba(245, 197, 66, 0.03) 50%, transparent 70%);
            background-size: 200% 200%;
            animation: shine 4s linear infinite;
            pointer-events: none;
        }

        .login-box .mario-icon {
            font-size: 4rem;
            display: block;
            margin-bottom: 0;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 8px 20px rgba(245, 197, 66, 0.3));
        }

        .login-box h1 {
            color: #f5c542;
            font-size: 2.6rem;
            text-shadow: 4px 4px 0 #b37b2a, 0 0 40px rgba(245, 197, 66, 0.15);
            margin-bottom: 2px;
            letter-spacing: 4px;
        }

        .login-box .subtitle {
            color: #b6d4ff;
            font-size: 0.95rem;
            margin-bottom: 25px;
            border-bottom: 2px solid #2d4f7a;
            padding-bottom: 15px;
            letter-spacing: 1px;
        }

        .login-box .subtitle span {
            color: #f5c542;
            font-weight: bold;
            background: rgba(245, 197, 66, 0.1);
            padding: 0 8px;
            border-radius: 10px;
        }

        /* Tabs */
        .tab-container {
            display: flex;
            gap: 6px;
            margin-bottom: 20px;
            background: #0a1a2b;
            border-radius: 40px;
            padding: 4px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px 12px;
            border: none;
            border-radius: 30px;
            background: transparent;
            color: #6b8c9e;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            box-shadow: none;
        }

        .tab-btn:hover {
            color: #b6d4ff;
            transform: none;
            background: rgba(255,255,255,0.05);
        }

        .tab-btn.active {
            background: #f5c542;
            color: #1d2f4a;
            box-shadow: 0 4px 15px rgba(245, 197, 66, 0.2);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .login-box label {
            display: block;
            text-align: left;
            color: #b6d4ff;
            font-weight: bold;
            font-size: 0.8rem;
            margin-top: 12px;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        .login-box label .label-icon {
            margin-right: 6px;
        }

        .login-box input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 40px;
            border: 2px solid transparent;
            background: #0a1a2b;
            color: #fff;
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }

        .login-box input:focus {
            border-color: #f5c542;
            background: #152d4a;
            box-shadow: 0 0 30px rgba(245, 197, 66, 0.1), inset 0 2px 10px rgba(0,0,0,0.3);
        }

        .login-box input::placeholder {
            color: #4a6a8a;
        }

        .login-box .input-group {
            position: relative;
        }

        .login-box .input-group .input-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1rem;
            opacity: 0.4;
            pointer-events: none;
        }

        .login-box .login-btn {
            margin-top: 20px;
            width: 100%;
            padding: 14px;
            background: linear-gradient(145deg, #f5c542, #dba52a);
            border: none;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.1rem;
            color: #1d2f4a;
            box-shadow: 0 7px 0 #b37b2a, 0 4px 20px rgba(245, 197, 66, 0.25);
            cursor: pointer;
            transition: all 0.1s ease;
            font-family: inherit;
            letter-spacing: 1.5px;
        }

        .login-box .login-btn:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #b37b2a;
        }

        .login-box .login-btn:hover {
            background: linear-gradient(145deg, #fdd95c, #f5c542);
            transform: scale(1.01);
        }

        .login-box .login-btn:disabled {
            opacity: 0.6;
            transform: translateY(3px);
            box-shadow: 0 4px 0 #b37b2a;
            cursor: not-allowed;
        }

        .login-box .error-msg {
            color: #ff6b6b;
            font-size: 0.8rem;
            margin-top: 12px;
            min-height: 20px;
            font-weight: bold;
            background: rgba(255, 0, 0, 0.12);
            padding: 5px 14px;
            border-radius: 30px;
            display: inline-block;
        }

        .login-box .success-msg {
            color: #69db7c;
            font-size: 0.8rem;
            margin-top: 12px;
            min-height: 20px;
            font-weight: bold;
            background: rgba(105, 219, 124, 0.12);
            padding: 5px 14px;
            border-radius: 30px;
            display: inline-block;
        }

        .login-box .footer-info {
            margin-top: 16px;
            display: flex;
            justify-content: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .login-box .footer-info .badge {
            background: #0a1a2b;
            padding: 3px 12px;
            border-radius: 30px;
            color: #6b8c9e;
            font-size: 0.65rem;
            border: 1px solid #1d3b5c;
        }

        .login-box .footer-info .badge strong {
            color: #b6d4ff;
        }

        .login-box .footer-info .badge .key {
            color: #f5c542;
        }

        .login-box .switch-text {
            margin-top: 12px;
            color: #6b8c9e;
            font-size: 0.8rem;
        }

        .login-box .switch-text a {
            color: #f5c542;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.2s;
        }

        .login-box .switch-text a:hover {
            color: #fdd95c;
            text-decoration: underline;
        }

        /* ===== JOGO ===== */
        #gameContainer.hidden {
            display: none;
        }

        .game-wrapper {
            background: #6b8cff;
            padding: 20px 20px 25px;
            border-radius: 24px;
            box-shadow: 0 12px 0 #3a5f8a, 0 8px 20px rgba(0, 0, 0, 0.6);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 16px;
            background: #5c94fc;
            box-shadow: inset 0 -6px 0 #3a6bb5, 0 0 0 4px #2d4f7a;
            image-rendering: pixelated;
            width: 800px;
            height: 400px;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 14px;
            padding: 10px 20px;
            background: #1d3b5c;
            border-radius: 60px;
            color: #f0e68c;
            text-shadow: 2px 2px 0 #0a1a2b;
            box-shadow: inset 0 -4px 0 #0f2840, 0 4px 0 #0f1f30;
            font-weight: bold;
            font-size: 1.1rem;
            flex-wrap: wrap;
            gap: 8px;
        }

        .info-panel span {
            background: #2d4f7a;
            padding: 5px 16px;
            border-radius: 40px;
            box-shadow: inset 0 -3px 0 #16304d;
        }

        .info-panel .user-tag {
            background: #0f2840;
            color: #b6d4ff;
            font-size: 0.8rem;
            padding: 5px 16px;
            border-radius: 40px;
            box-shadow: inset 0 -3px 0 #16304d;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-panel .user-tag .logout-btn {
            background: transparent;
            border: none;
            color: #ff6b6b;
            font-size: 0.9rem;
            cursor: pointer;
            padding: 0 4px;
            font-family: inherit;
            box-shadow: none;
            font-weight: bold;
            transition: all 0.2s;
        }

        .info-panel .user-tag .logout-btn:hover {
            color: #ff9999;
            transform: scale(1.2);
        }

        .info-panel .power-badge {
            background: #f5c542;
            color: #1d2f4a;
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            text-shadow: none;
            box-shadow: inset 0 -3px 0 #b37b2a;
            display: none;
        }

        .info-panel .power-badge.active {
            display: inline-block;
            animation: pulse 0.8s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        button {
            background: #f5c542;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
            color: #1d2f4a;
            box-shadow: 0 6px 0 #b37b2a, 0 4px 10px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            transition: all 0.07s;
            font-family: inherit;
        }

        button:active {
            transform: translateY(5px);
            box-shadow: 0 1px 0 #b37b2a;
        }

        button:hover {
            background: #fdd95c;
        }

        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .key-hint {
            color: #b6d4ff;
            font-size: 0.8rem;
            background: #0f2840;
            padding: 6px 12px;
            border-radius: 40px;
            letter-spacing: 1px;
        }

        .level-badge {
            background: #e53935;
            padding: 5px 18px;
            border-radius: 40px;
            color: #fff;
            text-shadow: 1px 1px 0 #7a1a1a;
        }

        .char-select {
            display: flex;
            gap: 6px;
            align-items: center;
            background: #0f2840;
            padding: 4px 12px 4px 16px;
            border-radius: 40px;
        }

        .char-btn {
            background: transparent;
            border: 2px solid transparent;
            border-radius: 30px;
            padding: 2px 10px;
            font-size: 0.9rem;
            box-shadow: none;
            color: #b6d4ff;
            transition: all 0.2s;
        }

        .char-btn:hover {
            background: #2d4f7a;
            transform: scale(1.05);
        }

        .char-btn.active {
            border-color: #f5c542;
            background: #2d4f7a;
            color: #fff;
        }

        .audio-controls {
            display: flex;
            gap: 6px;
            align-items: center;
            background: #0f2840;
            padding: 4px 12px;
            border-radius: 40px;
        }

        .audio-btn {
            background: transparent;
            border: none;
            color: #b6d4ff;
            font-size: 1.2rem;
            padding: 4px 8px;
            box-shadow: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .audio-btn:hover {
            transform: scale(1.2);
            color: #fff;
        }

        .audio-btn:active {
            transform: scale(0.9);
        }

        .volume-slider {
            width: 60px;
            height: 4px;
            accent-color: #f5c542;
            cursor: pointer;
        }

        @media (max-width: 860px) {
            canvas {
                width: 100%;
                height: auto;
                aspect-ratio: 800/400;
            }
            .game-wrapper {
                padding: 12px;
                width: 96vw;
            }
            .info-panel {
                font-size: 0.85rem;
                justify-content: center;
            }
            .volume-slider {
                width: 40px;
            }
            .login-box {
                padding: 25px 18px;
                max-height: 98vh;
            }
            .login-box h1 {
                font-size: 2rem;
            }
            .login-box .mario-icon {
                font-size: 3rem;
            }
            .tab-btn {
                font-size: 0.75rem;
                padding: 8px 8px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== TELA DE LOGIN / CADASTRO ===== -->
    <div id="loginScreen">
        <div class="login-box">
            <span class="mario-icon">⭐</span>
            <h1>SUPER MARIO</h1>
            <div class="subtitle">
                <span>6 fases</span> · <span>3 personagens</span> · <span>power-ups</span>
            </div>

            <!-- Tabs -->
            <div class="tab-container">
                <button class="tab-btn active" data-tab="login">🔐 Login</button>
                <button class="tab-btn" data-tab="register">📝 Cadastrar</button>
            </div>

            <!-- Tab Login -->
            <div class="tab-content active" id="tabLogin">
                <form id="loginForm" autocomplete="off">
                    <label for="loginUsername">
                        <span class="label-icon">👤</span> Nome de usuário
                    </label>
                    <div class="input-group">
                        <input
                            type="text"
                            id="loginUsername"
                            placeholder="Digite seu nome..."
                            required
                            minlength="2"
                            maxlength="20"
                            autofocus
                        >
                        <span class="input-icon">✏️</span>
                    </div>

                    <label for="loginPassword">
                        <span class="label-icon">🔒</span> Senha
                    </label>
                    <div class="input-group">
                        <input
                            type="password"
                            id="loginPassword"
                            placeholder="Digite sua senha"
                            required
                            minlength="3"
                        >
                        <span class="input-icon">🔑</span>
                    </div>

                    <button type="submit" class="login-btn" id="loginBtn">
                        ▶ Entrar no Jogo
                    </button>

                    <div class="error-msg" id="loginError"></div>
                </form>
                <div class="switch-text">
                    Não tem uma conta? <a id="switchToRegister">Cadastre-se aqui</a>
                </div>
            </div>

            <!-- Tab Cadastro -->
            <div class="tab-content" id="tabRegister">
                <form id="registerForm" autocomplete="off">
                    <label for="registerUsername">
                        <span class="label-icon">👤</span> Nome de usuário
                    </label>
                    <div class="input-group">
                        <input
                            type="text"
                            id="registerUsername"
                            placeholder="Escolha um nome..."
                            required
                            minlength="2"
                            maxlength="20"
                        >
                        <span class="input-icon">✏️</span>
                    </div>

                    <label for="registerPassword">
                        <span class="label-icon">🔒</span> Senha
                    </label>
                    <div class="input-group">
                        <input
                            type="password"
                            id="registerPassword"
                            placeholder="Crie uma senha (mínimo 3 caracteres)"
                            required
                            minlength="3"
                        >
                        <span class="input-icon">🔑</span>
                    </div>

                    <label for="registerConfirmPassword">
                        <span class="label-icon">✅</span> Confirmar senha
                    </label>
                    <div class="input-group">
                        <input
                            type="password"
                            id="registerConfirmPassword"
                            placeholder="Digite a senha novamente"
                            required
                            minlength="3"
                        >
                        <span class="input-icon">🔐</span>
                    </div>

                    <button type="submit" class="login-btn" id="registerBtn">
                        📝 Criar Conta
                    </button>

                    <div id="registerMessage"></div>
                </form>
                <div class="switch-text">
                    Já tem uma conta? <a id="switchToLogin">Faça login aqui</a>
                </div>
            </div>

            <div class="footer-info">
                <span class="badge">👤 <strong>admin</strong> <span class="key">/ 1234</span></span>
                <span class="badge">👤 <strong>mario</strong> <span class="key">/ mario</span></span>
                <span class="badge">👤 <strong>teste</strong> <span class="key">/ 123</span></span>
            </div>
        </div>
    </div>

    <!-- ===== JOGO ===== -->
    <div id="gameContainer" class="hidden">
        <div class="game-wrapper">
            <canvas id="gameCanvas" width="800" height="400"></canvas>
            <div class="info-panel">
                <div>
                    <span>🪙 <span id="coinDisplay">0</span></span>
                    <span style="margin-left: 10px;">🏆 <span id="scoreDisplay">0</span></span>
                    <span style="margin-left: 10px;" class="level-badge">Fase <span id="levelDisplay">1</span>/6</span>
                    <span class="power-badge" id="powerBadge">⭐ POWER-UP</span>
                    <span class="user-tag" id="userTag">
                        👤 <span id="usernameDisplay">Jogador</span>
                        <button class="logout-btn" id="logoutBtn" title="Sair do jogo">✕</button>
                    </span>
                </div>
                <div class="controls">
                    <div class="audio-controls">
                        <button class="audio-btn" id="playBtn" title="Play/Pause">▶️</button>
                        <button class="audio-btn" id="stopBtn" title="Stop">⏹️</button>
                        <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="70">
                    </div>
                    <div class="char-select">
                        <span style="color:#b6d4ff;font-size:0.8rem;">👤</span>
                        <button class="char-btn active" data-char="mario">Mario</button>
                        <button class="char-btn" data-char="luigi">Luigi</button>
                        <button class="char-btn" data-char="toad">Toad</button>
                    </div>
                    <span class="key-hint">← ↑ →</span>
                    <button id="restartBtn">↺ Reiniciar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ============================================================
            //  SISTEMA DE LOGIN E CADASTRO COM localStorage
            // ============================================================
            const loginScreen = document.getElementById('loginScreen');
            const gameContainer = document.getElementById('gameContainer');
            const usernameDisplay = document.getElementById('usernameDisplay');
            const logoutBtn = document.getElementById('logoutBtn');
            const powerBadge = document.getElementById('powerBadge');

            // Tabs
            const tabBtns = document.querySelectorAll('.tab-btn');
            const tabContents = {
                login: document.getElementById('tabLogin'),
                register: document.getElementById('tabRegister')
            };

            // Forms
            const loginForm = document.getElementById('loginForm');
            const loginUsername = document.getElementById('loginUsername');
            const loginPassword = document.getElementById('loginPassword');
            const loginError = document.getElementById('loginError');
            const loginBtn = document.getElementById('loginBtn');

            const registerForm = document.getElementById('registerForm');
            const registerUsername = document.getElementById('registerUsername');
            const registerPassword = document.getElementById('registerPassword');
            const registerConfirmPassword = document.getElementById('registerConfirmPassword');
            const registerMessage = document.getElementById('registerMessage');
            const registerBtn = document.getElementById('registerBtn');

            // Switches
            const switchToRegister = document.getElementById('switchToRegister');
            const switchToLogin = document.getElementById('switchToLogin');

            let currentUser = null;

            // --- Gerenciamento de usuários no localStorage ---
            function getUsers() {
                try {
                    return JSON.parse(localStorage.getItem('marioUsers')) || {};
                } catch {
                    return {};
                }
            }

            function saveUsers(users) {
                localStorage.setItem('marioUsers', JSON.stringify(users));
            }

            function userExists(username) {
                const users = getUsers();
                return users[username.toLowerCase()] !== undefined;
            }

            function validateUser(username, password) {
                const users = getUsers();
                const key = username.toLowerCase();
                if (users[key] && users[key] === password) {
                    return true;
                }
                return false;
            }

            function registerUser(username, password) {
                const users = getUsers();
                const key = username.toLowerCase();
                if (users[key]) {
                    return false; // Usuário já existe
                }
                users[key] = password;
                saveUsers(users);
                return true;
            }

            // --- Tabs ---
            tabBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    tabBtns.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    const tab = this.dataset.tab;
                    Object.keys(tabContents).forEach(key => {
                        tabContents[key].classList.toggle('active', key === tab);
                    });
                    // Limpa mensagens
                    loginError.textContent = '';
                    registerMessage.innerHTML = '';
                });
            });

            // --- Switches entre tabs ---
            switchToRegister.addEventListener('click', function(e) {
                e.preventDefault();
                tabBtns.forEach(b => b.classList.remove('active'));
                document.querySelector('.tab-btn[data-tab="register"]').classList.add('active');
                tabContents.login.classList.remove('active');
                tabContents.register.classList.add('active');
                loginError.textContent = '';
                registerMessage.innerHTML = '';
                setTimeout(() => registerUsername.focus(), 100);
            });

            switchToLogin.addEventListener('click', function(e) {
                e.preventDefault();
                tabBtns.forEach(b => b.classList.remove('active'));
                document.querySelector('.tab-btn[data-tab="login"]').classList.add('active');
                tabContents.register.classList.remove('active');
                tabContents.login.classList.add('active');
                loginError.textContent = '';
                registerMessage.innerHTML = '';
                setTimeout(() => loginUsername.focus(), 100);
            });

            // --- Login ---
            loginForm.addEventListener('submit', function(e) {
                e.preventDefault();
                const username = loginUsername.value.trim();
                const password = loginPassword.value.trim();

                loginError.textContent = '';
                loginBtn.disabled = true;
                loginBtn.textContent = '⏳ Entrando...';

            // --- Função para desenhar o personagem ---
            function drawCharacter() {
                const charKey = charStats.image;
                const img = charKey ? characterImages[charKey] : null;
                const isLoaded = charKey ? imagesLoaded[charKey] : false;
                
                if (player.hasStar) {
                    ctx.shadowColor = '#ffd700';
                    ctx.shadowBlur = 25;
                }
                
                if (img && isLoaded) {
                    const scale = player.bigMode ? 1.5 : 1.5;
                    const imgWidth = player.w * scale;
                    const imgHeight = player.h * scale;
                    const offsetX = (imgWidth - player.w) / 2;
                    const offsetY = (imgHeight - player.h) / 2;
                    
                    if (player.facing < 0) {
                        ctx.save();
                        ctx.translate(player.x + player.w / 2, player.y + player.h / 2);
                        ctx.scale(-1, 1);
                        ctx.drawImage(img, -imgWidth/2, -imgHeight/2, imgWidth, imgHeight);
                        ctx.restore();
                    } else {
                        ctx.drawImage(img, player.x - offsetX, player.y - offsetY, imgWidth, imgHeight);
                    }
                } else {
                    const color = player.hasStar ? '#ffd700' : (player.hasMushroom ? '#ff6b35' : charStats.color1);
                    ctx.fillStyle = color;
                    ctx.fillRect(player.x, player.y + 10, player.w, player.h - 10);
                    ctx.fillStyle = player.hasStar ? '#fff' : charStats.skin;
                    ctx.fillRect(player.x + 4, player.y, player.w - 8, 14);
                    ctx.fillStyle = color;
                    ctx.fillRect(player.x + 2, player.y - 4, player.w - 4, 8);

            // --- Reset Completo ---
            function resetGame() {
                gameOver = false;
                win = false;
                score = 0;
                coins = 0;
                currentLevel = 1;
                player.hasMushroom = false;
                player.hasStar = false;
                player.bigMode = false;
                player.starTimer = 0;
                applyCharStats();
                loadLevel(currentLevel);
                updateDisplay();
                updatePowerBadge();
            }

            // --- Avançar Fase ---
            function nextLevel() {
                if (currentLevel < MAX_LEVEL) {
                    currentLevel++;
                    loadLevel(currentLevel);
                    win = false;
                    gameOver = false;
                    bossDefeated = false;
                } else {
                    win = true;
                }
            }

            // --- Atualizar badge de power-up ---
            function updatePowerBadge() {
                if (player.hasStar) {
                    powerBadge.textContent = '⭐ ESTRELA ATIVA!';
                    powerBadge.className = 'power-badge active';
                    powerBadge.style.background = '#ffd700';
                    powerBadge.style.color = '#1d2f4a';
                } else if (player.hasMushroom) {
                    powerBadge.textContent = '🍄 SUPER COGUMELO';
                    powerBadge.className = 'power-badge active';
                    powerBadge.style.background = '#ff6b35';
                    powerBadge.style.color = '#fff';
                } else {
                    powerBadge.className = 'power-badge';
                }
            }

            // --- Update ---
            function update() {
                if (gameOver || win) return;

                if (player.hasStar) {
                    player.starTimer--;
                    if (player.starTimer <= 0) {
                        player.hasStar = false;
                        player.starTimer = 0;
                        updatePowerBadge();
                    }
                }

                if (player.invincible > 0) player.invincible--;

                const speed = player.hasStar ? charStats.speed * 1.5 : charStats.speed;
                if (keys.left) {
                    player.x -= speed;
                    player.facing = -1;
                }
                if (keys.right) {
                    player.x += speed;
                    player.facing = 1;
                }
                if (player.x < 0) player.x = 0;
                if (player.x + player.w > 800) player.x = 800 - player.w;

                player.vy += GRAVITY;
                player.y += player.vy;

                player.onGround = false;
                for (let p of platforms) {
                    if (player.vy >= 0 && rectCollide(player, p)) {
                        player.y = p.y - player.h;
                        player.vy = 0;
                        player.onGround = true;
                    }
                    if (p.type === 'question' && p.hasCoin && rectCollide(player, p)) {
                        p.hasCoin = false;
                        coins++;
                        score += 50;
                        updateDisplay();
                    }
                }

                for (let coin of coinObjects) {
                    if (!coin.collected && rectCollide(player, coin)) {
                        coin.collected = true;
